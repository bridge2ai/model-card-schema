considerations:
  users:
    - description: |
        Generative-AI researchers studying scaling, conditioning, and safety in text-to-image
        diffusion models.
    - description: |
        Artists, designers, and creative practitioners using SDXL as an assistive tool for
        artwork, concept design, and visual ideation, subject to the CreativeML Open RAIL++-M
        use-based restrictions.
    - description: |
        Educators teaching about diffusion models, multimodal generation, and responsible-AI
        considerations in generative systems.

  use_cases:
    - description: "Research on generative models (capabilities, scaling, conditioning, evaluation)"
    - description: "Probing and analyzing the limitations, biases, and failure modes of text-to-image systems"
    - description: "Safe deployment research — content filtering, watermarking, and provenance"
    - description: "Generation of artworks, design assets, and creative content within the license terms"
    - description: "Educational and creative tooling (illustration, storyboarding, concept art)"

  limitations:
    - description: |
        Does not achieve perfect photorealism; subtle anatomy (hands, eyes, ears) and physically
        consistent reflections, refractions, and lighting can fail in non-obvious ways.
    - description: |
        Cannot reliably render legible text. Words inside images frequently come out garbled,
        especially for longer strings or non-Latin scripts.
    - description: |
        Struggles with compositional complexity: precise spatial relationships ("X on top of Y
        next to Z"), counting, and rare-attribute binding (e.g. "a red cube and a green sphere"
        where attributes are reliably bound to the correct object) remain failure modes.
    - description: |
        Faces and people, especially in groups or at small scale within the image, often render
        with distortions. The optional refiner helps but does not eliminate these artifacts.
    - description: |
        Lossy VAE autoencoding: the latent-to-pixel decoder can introduce subtle high-frequency
        artifacts and is the upper bound on achievable fidelity.
    - description: |
        Trained predominantly on English-captioned image-text pairs — generation quality and
        prompt understanding for non-English prompts is substantially worse.
    - description: |
        Outputs are uncalibrated probabilistic samples — the same prompt produces different
        images on different seeds, making reproducibility dependent on seed and scheduler.

  tradeoffs:
    - description: |
        Accuracy vs fairness: the model's visual quality and prompt-faithfulness scale with the
        size and diversity of training data, but increasing scale on web-scraped corpora
        amplifies documented demographic, cultural, and aesthetic biases (Western-centric, light
        skin tones, stereotyped occupation-gender associations). No explicit fairness-utility
        trade-off optimization was applied during training; this is a known limitation that
        downstream deployers must mitigate through prompt-side debiasing, output filtering, or
        diverse fine-tuning.
    - description: |
        Quality vs compute: SDXL Base 1.0 requires ~10GB of VRAM for fp16 inference at 1024x1024
        and is ~3x slower per step than SD 1.5. Pairing with the Refiner improves quality but
        roughly doubles inference compute compared to base-only.
    - description: |
        Base-only vs base+refiner: base-only is faster and simpler to deploy; base+refiner
        improves human-preference win rate by an additional ~5-10 percentage points but doubles
        end-to-end latency.
    - description: |
        Resolution vs prompt fidelity: at the native 1024x1024 resolution, SDXL is well aligned
        to its training distribution. Generating outside the trained resolution buckets degrades
        composition and fidelity even with the micro-conditioning hints.

  ethical_considerations:
    - name: "Demographic and cultural bias amplification"
      mitigation_strategy: |
        Use diverse prompts and seed sweeps when evaluating downstream applications. Apply
        post-hoc fairness audits (e.g. occupation-gender, skin-tone, age sweeps) before
        deploying SDXL in user-facing products. Consider prompt-side debiasing libraries or
        diverse fine-tuning datasets.
    - name: "Non-consensual sexual content and deepfakes"
      mitigation_strategy: |
        The CreativeML Open RAIL++-M license explicitly prohibits these uses. Operators should
        implement face-similarity filtering, NSFW classifiers (e.g. the diffusers safety
        checker), and prompt-blocklists for the names of real people. Watermark generated
        outputs (e.g. invisible watermarking) and log provenance.
    - name: "Child sexual abuse material (CSAM)"
      mitigation_strategy: |
        Strictly prohibited under license and law. Maintain an up-to-date prompt blocklist,
        deploy a CSAM-detection classifier on outputs, and follow industry reporting standards
        (NCMEC/IWF). Audit training-data provenance: subsequent independent audits of LAION-5B
        identified illegal content in the upstream pool; deployers should be alert to
        residual risks.
    - name: "Disinformation and impersonation"
      mitigation_strategy: |
        SDXL can synthesize photorealistic-looking imagery of fictional or real-seeming people
        and scenes. Apply C2PA / content credentials provenance signing on outputs and clearly
        label generated images. Block named-person prompts in news / political contexts.
    - name: "Copyright and consent"
      mitigation_strategy: |
        Training data was web-scraped without per-image creator consent. Consult evolving legal
        guidance in the deployment jurisdiction. Offer opt-out mechanisms (e.g.
        haveibeentrained.com / spawning.ai) and respect dataset-level opt-outs in any
        fine-tuning.
    - name: "Environmental impact"
      mitigation_strategy: |
        Initial training of SDXL consumed substantial energy (large-scale multi-week GPU
        training). Downstream deployers should batch requests, use lower-precision inference,
        and consider distilled / accelerated variants (e.g. SDXL-Turbo, LCM-LoRA, SSD-1B)
        when fidelity allows.

  out_of_scope_uses:
    - description: "Generating CSAM or sexual content involving minors"
    - description: "Non-consensual sexual imagery of real or identifiable people (deepfake pornography)"
    - description: "Impersonation or political disinformation involving real individuals"
    - description: "Generating photorealistic representations of real people without consent"
    - description: "Producing factual or news imagery (the model does not represent real-world events or persons accurately)"
    - description: "Medical, legal, or safety-critical decision-making"
    - description: "Harassment, defamation, or content intended to harm individuals or groups"
    - description: "Generating illegal content (violence, hate speech, instructions for weapons, etc.) prohibited under the CreativeML Open RAIL++-M license"
    - description: "Use in violation of applicable copyright, privacy, or publicity laws"

bias_model: |
  SDXL inherits and amplifies biases documented in the LAION-5B-derived training data: predominant
  Western/Anglophone aesthetic, over-representation of light skin tones, stereotypical
  associations between gender and occupation prompts ("CEO", "nurse", "engineer", "criminal"),
  and culturally narrow defaults for under-specified prompts (e.g. "wedding", "food", "home"
  default to Western/North-American-European visual signifiers). No formal fairness audit or
  debiasing fine-tune was reported by Stability AI for the 1.0 release.

  The two-text-encoder conditioning stack (CLIP-ViT/L + OpenCLIP-ViT/G) also inherits documented
  biases of the CLIP family — including biased zero-shot associations between race/gender and
  occupation/affect words — which propagate through cross-attention into the diffusion process.

  Downstream deployers should run quantitative fairness audits (e.g. occupation-gender, skin-tone,
  age, and geography sweeps) on their target prompt distribution before shipping SDXL in
  user-facing or decision-supporting applications.
bias_output: |
  Generated images tend to default to: (a) lighter skin tones when race is not specified;
  (b) male depictions for high-status / technical occupation prompts and female depictions for
  caregiving / domestic prompts; (c) Western architectural and clothing styles for generic
  "city", "home", "person" prompts; (d) thin, conventionally-attractive body types for under-
  specified "person" prompts; (e) photorealistic styles biased toward stock-photography
  composition.

  The model also exhibits known output-level failure modes that interact with bias: text
  rendering errors (especially for non-Latin scripts), distorted faces (more pronounced for
  under-represented demographics), and lower prompt faithfulness for non-English prompts.

  Refiner-augmented outputs do not eliminate these biases — they primarily improve high-
  frequency detail rather than altering the conditional distribution learned by the base.
