model_parameters:
  model_architecture: |
    Latent diffusion model (LDM) with a ~2.6B-parameter UNet operating on 4-channel VAE latents,
    conditioned via cross-attention on the concatenated hidden states of two frozen pretrained
    text encoders: OpenCLIP-ViT/G (bigG/14) and CLIP-ViT/L. Total trainable parameter count is
    approximately 3.5B (UNet plus learned projection layers). Compared to SD 1.5/2.1 the UNet
    has substantially more transformer blocks at lower-resolution feature stages, a heterogeneous
    distribution of attention blocks across stages, and added micro-conditioning inputs (original
    image size, crop top-left coordinates, target size) that are sinusoidally embedded and
    summed into the timestep embedding. Image decoding uses an improved VAE with a higher
    spatial-fidelity decoder than SD 1.5/2.1.

  data:
    - name: "Filtered subset of LAION-5B (private)"
      link: "https://laion.ai/blog/laion-5b/"
      description: |
        SDXL was trained on an internal Stability AI dataset built from a filtered subset of
        LAION-5B (and additional proprietary aesthetic-filtered data). The exact filtered subset
        is not publicly released. LAION-5B is a 5.85B-pair web-scraped image-text dataset.
      sensitive:
        sensitive_data:
          - "Web-scraped image-text pairs may contain incidental PII (faces, names in captions, watermarks)"
          - "LAION-5B has been independently documented to contain a long tail of NSFW, hateful, and illegal imagery; filtering applied by Stability AI for SDXL is not fully documented publicly"
      bias_input: |
        LAION-5B and similar web-scale image-text corpora are documented to over-represent
        English-language and Western/North-American/European visual culture, light skin tones,
        and stereotypical occupation-gender associations. See Birhane et al. 2021 ("Multimodal
        datasets: misogyny, pornography, and malignant stereotypes") and the LAION-5B paper for
        documented biases. The filtered SDXL subset inherits these distributional biases.
    - name: "Internal aesthetic-filtered Stability AI dataset (private)"
      link: "https://huggingface.co/stabilityai/stable-diffusion-xl-base-1.0"
      description: |
        Additional proprietary high-aesthetic-quality image-text pairs used to fine-tune SDXL
        toward visually preferred outputs. Contents and curation criteria are not publicly
        disclosed.

  input_format: "UTF-8 text prompt (and optionally a negative prompt); for image-to-image variants, an init image"
  input_format_map:
    - key: "prompt_type"
      value: "string (English text prompt)"
    - key: "max_prompt_length"
      value: "77 tokens per text encoder (CLIP-L) / 77 tokens (OpenCLIP-G); longer prompts are truncated"
    - key: "negative_prompt"
      value: "optional string"
    - key: "guidance_scale"
      value: "typical 5.0-9.0 (classifier-free guidance)"
    - key: "native_resolution"
      value: "1024x1024 (also 1152x896, 896x1152, 1216x832, 832x1216, 1344x768, 768x1344, 1536x640, 640x1536)"
  output_format: "Generated RGB image at the requested resolution (default 1024x1024)"
  output_format_map:
    - key: "shape"
      value: "[B, 3, H, W] with H=W=1024 by default"
    - key: "dtype"
      value: "uint8 (after VAE decode + clamp) or float in [0,1]"
    - key: "color_space"
      value: "sRGB"

  training_procedure:
    description: |
      Latent diffusion training with the standard epsilon-prediction objective in the VAE latent
      space. SDXL is trained in a multi-stage curriculum: (1) pretraining at 256x256 on a large
      filtered subset of LAION-5B; (2) continued training at 512x512; (3) high-resolution
      training at and above 1024x1024 with multi-aspect-ratio bucketing and micro-conditioning
      on original-size, crop-coordinates, and target-size signals to prevent the model from
      learning to produce cropped or low-resolution-looking outputs. Final fine-tuning uses the
      internal aesthetic-filtered Stability AI dataset.
    methodology: |
      Classifier-free guidance is enabled by random text-conditioning dropout during training.
      Two frozen pretrained text encoders (CLIP-ViT/L and OpenCLIP-ViT/G) provide the conditioning
      signal; only the UNet (and small projection layers) are updated. The improved VAE decoder
      is trained separately to reduce reconstruction artifacts versus the SD 1.5/2.1 VAE.
    reproducibility_info:
      hyperparameters:
        optimizer: "AdamW"
        loss_function: "Denoising L2 (epsilon-prediction) over noise schedule, with classifier-free guidance dropout"
        optimization_techniques:
          - "Mixed-precision training"
          - "Multi-aspect-ratio bucketing"
          - "Micro-conditioning on original-size, crop coordinates, and target size"
          - "Classifier-free guidance with random conditioning dropout"
          - "VAE latent caching"

