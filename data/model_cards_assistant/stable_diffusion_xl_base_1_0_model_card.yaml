schema_version: "0.0.2"

model_details:
  name: "Stable Diffusion XL Base 1.0 (stabilityai/stable-diffusion-xl-base-1.0)"
  short_description: "Latent text-to-image diffusion model (~3.5B parameters in the base UNet) from Stability AI, using a two-text-encoder conditioning stack and forming the first stage of the SDXL ensemble-of-experts pipeline."
  overview: |
    Stable Diffusion XL (SDXL) Base 1.0 is a diffusion-based text-to-image generative model developed
    by Stability AI. Compared to prior Stable Diffusion versions (1.5, 2.1), SDXL substantially scales
    up the UNet backbone (approximately 3x the parameters of SD 2.1's UNet, ~2.6B in the UNet plus
    additional text-encoder parameters for a total ~3.5B trainable parameters in the base stage) and
    conditions on two pretrained text encoders concurrently: OpenCLIP-ViT/G and CLIP-ViT/L.

    SDXL is designed as an "ensemble of experts" pipeline for latent diffusion: the base model
    (this checkpoint) generates noisy latents at high noise levels, and an optional separate
    refinement model (stabilityai/stable-diffusion-xl-refiner-1.0) performs the final denoising
    steps in a SDEdit-style image-to-image pass to improve high-frequency detail. The base model
    can be used standalone and still produces strong results without the refiner.
  documentation: |
    ## Architecture
    - Two-stage latent diffusion ensemble: base + (optional) refiner
    - Base UNet: ~2.6B parameters (~3x the UNet of SD 2.1); ~3.5B total trainable parameters
      including text encoders
    - Dual text encoders: OpenCLIP-ViT/G (bigG/14) and CLIP-ViT/L concatenated along the
      channel axis for cross-attention conditioning
    - Latent space: VAE-encoded 4-channel latents (SDXL VAE has a higher-fidelity decoder than
      SD 1.5/2.1)
    - Native resolution: 1024x1024 (also supports common aspect ratios via micro-conditioning
      on original-size and crop coordinates)
    - Micro-conditioning inputs: original image size, crop coordinates, target size — addresses
      training-data resolution and crop artifacts identified in the SDXL paper

    ## Usage (diffusers >= 0.19.0)
    ```python
    from diffusers import DiffusionPipeline
    import torch

    pipe = DiffusionPipeline.from_pretrained(
        "stabilityai/stable-diffusion-xl-base-1.0",
        torch_dtype=torch.float16,
        use_safetensors=True,
        variant="fp16",
    )
    pipe.to("cuda")
    image = pipe(prompt="An astronaut riding a green horse").images[0]
    ```

    For best quality the diffusers documentation recommends chaining the base with the refiner:
    use the base for high-noise denoising steps (e.g. denoising_end=0.8) and pass the latents to
    the refiner for the remaining steps (denoising_start=0.8).

    ## Citation
    See `model_details.citations` and `model_details.references`.
