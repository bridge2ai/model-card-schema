schema_version: "0.0.2"

model_details:
  name: "CLIP ViT-B/32 (openai/clip-vit-base-patch32)"
  short_description: "Contrastive vision-language model with a ViT-B/32 image encoder and a masked self-attention text Transformer, trained on 400M (image, text) pairs for zero-shot image classification and image-text retrieval."
  overview: |
    CLIP (Contrastive Language-Image Pre-training) is a dual-encoder multimodal model from OpenAI
    (Radford et al., 2021). A vision encoder (Vision Transformer, ViT-B/32) and a text encoder
    (masked self-attention Transformer) are jointly trained with a symmetric InfoNCE-style contrastive
    objective so that the cosine similarity of paired image / caption embeddings is maximized while
    unpaired pairs are pushed apart.

    The result is a single embedding space that lets the model perform a wide range of vision tasks
    in a zero-shot manner: classification is reframed as picking the class prompt whose text embedding
    is most similar to a given image embedding, with no task-specific fine-tuning. The model was
    originally released as part of the CLIP paper "Learning Transferable Visual Models From Natural
    Language Supervision" (arXiv:2103.00020) and is distributed on the HuggingFace Hub as
    `openai/clip-vit-base-patch32`.

    The `ViT-B/32` variant uses a base-sized Vision Transformer that splits each input image into
    non-overlapping 32x32 patches, giving 50 tokens (7x7 + 1 [CLS]) at the standard 224x224 input
    resolution. It is the smallest and fastest of the OpenAI CLIP releases.
  documentation: |
    ## Model Architecture
    - Image encoder: Vision Transformer (ViT-B/32)
        - 12 transformer layers, hidden size 768, 12 attention heads
        - Patch size 32x32, input resolution 224x224 (50 visual tokens incl. [CLS])
        - Pre-norm LayerNorm; GELU activations
    - Text encoder: 12-layer masked self-attention Transformer
        - Hidden size 512, 8 attention heads, max sequence length 77 BPE tokens
        - Lower-cased byte-pair-encoding tokenizer (49,408 vocab)
    - Projection: both encoders project into a shared 512-d multimodal embedding space
    - Total parameters: ~151M (vision ~88M, text ~63M)
    - Learned temperature parameter for contrastive softmax

    ## Usage with transformers
    ```python
    from PIL import Image
    import requests
    from transformers import CLIPProcessor, CLIPModel

    model = CLIPModel.from_pretrained("openai/clip-vit-base-patch32")
    processor = CLIPProcessor.from_pretrained("openai/clip-vit-base-patch32")

    url = "http://images.cocodataset.org/val2017/000000039769.jpg"
    image = Image.open(requests.get(url, stream=True).raw)

    inputs = processor(
        text=["a photo of a cat", "a photo of a dog"],
        images=image,
        return_tensors="pt",
        padding=True,
    )
    outputs = model(**inputs)
    logits_per_image = outputs.logits_per_image       # image-text similarity
    probs = logits_per_image.softmax(dim=1)           # zero-shot class probabilities
    ```

    For zero-shot classification at scale, prompt templates such as
    `"a photo of a {label}."` (ensembled over several templates) are the standard CLIP recipe.

    ## Citation
    See model_details.citations and model_details.references.
