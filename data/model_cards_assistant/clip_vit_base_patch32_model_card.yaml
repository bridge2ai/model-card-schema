  training_procedure:
    methodology: |
      Joint training of vision and text encoders from scratch via a symmetric contrastive
      InfoNCE objective on (image, text) pairs sampled from WIT. In each mini-batch of N
      image-text pairs the model predicts which of the N x N possible (image, text) pairings
      are the true matches.
    hyperparameters:
      optimizer: "Adam with decoupled weight decay (AdamW)"
      loss_function: "Symmetric cross-entropy over scaled cosine similarities (CLIP / InfoNCE)"
      batch_size: 32768
      training_epochs: 32
      optimization_techniques:
        - "Mixed precision (FP16)"
        - "Gradient checkpointing"
        - "Learnable temperature (clipped to <= 100)"
        - "Cosine learning-rate schedule with warmup"

