model_parameters:
  model_architecture: |
    Dual-encoder contrastive vision-language model.
      - Image encoder: Vision Transformer (ViT-B/32) — 12 layers, hidden size 768, 12 heads,
        patch size 32, 224x224 input. ~88M params.
      - Text encoder: 12-layer Transformer with causal masked self-attention — hidden size 512,
        8 heads, 77-token context, 49,408-token BPE vocabulary. ~63M params.
      - Both encoders are linearly projected to a shared 512-d embedding space and L2-normalized.
      - Contrastive objective: symmetric cross-entropy over cosine similarities scaled by a
        learned temperature.
    Total: ~151M parameters.

  data:
    - name: "WIT (WebImageText)"
      link: "https://arxiv.org/abs/2103.00020"
      description: |
        OpenAI's internal dataset of ~400 million (image, text) pairs collected from a broad
        crawl of publicly available internet sources, filtered so that captions contain one of
        a curated set of 500,000 search queries. The dataset itself was not released.
      sensitive:
        sensitive_data:
          - "Web-scraped images may contain incidental faces and other PII"
          - "Captions can include personal names, locations, and demographic descriptors"
      bias_input: |
        Sourced from a non-curated internet crawl that overrepresents English-language and
        Western, developed-nation users; younger and male users are also overrepresented
        (per the CLIP paper, Section 7 and the OpenAI model card). Captions reflect the social
        and linguistic biases of their authors.
    - name: "ImageNet-1k (ILSVRC2012)"
      link: "https://www.image-net.org/"
      description: |
        Used as a zero-shot classification evaluation benchmark (50,000 validation images,
        1,000 classes). Not used for training.
      bias_input: |
        Documented geographic / demographic skew (Crawford & Paglen 2019; Yang et al. 2020);
        some classes overlap with person-identity categories.
    - name: "CIFAR-10 / CIFAR-100"
      link: "https://www.cs.toronto.edu/~kriz/cifar.html"
      description: |
        Low-resolution (32x32) classification benchmarks used for zero-shot evaluation.
    - name: "FairFace"
      link: "https://arxiv.org/abs/1908.04913"
      description: |
        Face-image dataset balanced across 7 race groups, used by the CLIP authors to probe
        race / gender / age behavior of CLIP for the bias analysis in the model card.
      sensitive:
        sensitive_data:
          - "Human faces with demographic annotations (race, gender, age)"
      bias_input: |
        Used only as a diagnostic probe of model bias, not for training. The seven-way racial
        taxonomy is itself a social construct and a limitation of the analysis.
    - name: "Food101 / Stanford Cars / Oxford-IIIT Pets / 25+ other vision benchmarks"
      description: |
        Used in the CLIP paper to evaluate zero-shot and linear-probe transfer performance
        across a wide spectrum of vision tasks (fine-grained classification, OCR, action
        recognition, geo-localization, etc.). None were used for training.

  input_format: "RGB image plus one or more text strings (class prompts or captions)"
