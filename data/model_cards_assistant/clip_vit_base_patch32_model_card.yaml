  evaluation_procedure:
    methodology: |
      Zero-shot evaluation follows the CLIP paper recipe: class names are inserted into one or
      more prompt templates (e.g., "a photo of a {label}.") and embedded with the text encoder;
      images are embedded with the image encoder; predictions are the argmax of the cosine
      similarity between the image embedding and the class-prompt embeddings. For ImageNet, the
      paper ensembles ~80 prompt templates.
    benchmarks:
      - "ImageNet-1k, ImageNet-V2, ImageNet-A, ImageNet-R, ImageNet-Sketch, ObjectNet"
      - "CIFAR-10, CIFAR-100, Food101, Stanford Cars, Oxford-IIIT Pets, Flowers-102"
      - "MSCOCO and Flickr30k image-text retrieval"
      - "FairFace (for race / gender / age behavioral analysis)"
    baselines:
      - "Fully-supervised ResNet-50 on ImageNet (76.1% top-1) as a reference, not a like-for-like comparison"
      - "Linear-probe transfer baselines from prior self-supervised models (SimCLRv2, MoCo v2, BYOL)"
    sota_comparison: |
      At release, CLIP ViT-B/32 was competitive with a fully-supervised ResNet-50 on ImageNet
      zero-shot top-1 (63.2% vs 76.1% supervised) without ever seeing ImageNet labels, and it
      established a new state of the art for zero-shot transfer across the suite of 27+ vision
      benchmarks reported in Radford et al. 2021.
    uncertainty_quantification: |
      Headline ImageNet zero-shot accuracy bands are reported in the CLIP paper as +/-0.3
      percentage points across prompt-ensemble seeds; other benchmarks were reported as point
      estimates. Bias-analysis metrics on FairFace are sensitive to class-design choices.
    evaluation_data_separate: true

considerations:
  users:
    - description: |
        AI / computer-vision researchers studying multimodal representation learning, zero-shot
        transfer, robustness to distribution shift, and the social biases of large vision-language
        models.
    - description: |
        ML practitioners using CLIP as a frozen image / text encoder in downstream systems
        (retrieval, captioning, diffusion-model conditioning, embedding-based search).

  use_cases:
    - description: "Zero-shot image classification via natural-language class prompts"
    - description: "Image-text retrieval (text-to-image and image-to-text search)"
    - description: "Image / text embedding extraction for downstream tasks"
    - description: "Conditioning signal for generative models (e.g., text-to-image diffusion)"
    - description: "Probing studies of bias, robustness, and capability in vision-language models"

  limitations:
    - description: |
        Performance is uneven across tasks: CLIP struggles with fine-grained classification
        (e.g., car models, flower species, aircraft variants), systematic counting of objects,
        and OCR of dense text (per Radford et al. 2021, Section 3).
    - description: |
        Strongly English-centric. The text encoder was trained on overwhelmingly English captions
        and degrades sharply on other languages; non-English use is not recommended by the
        original authors.
    - description: |
        Training data was scraped from the open web with minimal curation. It therefore inherits
        toxic, stereotyped, and copyrighted material present in those sources.
    - description: |
        FairFace evaluations in the CLIP paper show that bias-relevant metrics are highly
        sensitive to the choice of class taxonomy (e.g., adding crime-related categories causes
        large disparities by race and gender).
    - description: |
        Linear-probe and few-shot transfer can underestimate true representational quality;
        zero-shot prompt engineering can in turn overestimate it on benchmarks where prompts
        leak label information.

  tradeoffs:
    - description: |
        Accuracy vs fairness: aggressive prompt engineering can push zero-shot accuracy higher
        on benchmarks like ImageNet but tends to amplify FairFace bias disparities (especially
        for crime-related class designs). Deployments that care about subgroup parity should
        prefer conservative class taxonomies even at a top-1 accuracy cost.
    - description: |
        Speed vs accuracy: ViT-B/32 is the smallest CLIP variant (~151M params) and runs roughly
        3-4x faster than ViT-L/14 but trails it by ~12 pts of ImageNet zero-shot top-1
        (63.2% vs 75.5%). Choose B/32 when latency / memory budget matters more than peak
        accuracy.
    - description: |
        Zero-shot generality vs task-specific accuracy: fine-tuning CLIP on a target dataset
        usually beats zero-shot CLIP by a wide margin, but loses much of CLIP's distributional
        robustness (effective robustness drops, per Radford et al. 2021 Section 3.3).

  ethical_considerations:
    - name: "Demographic bias and disparate performance"
      mitigation_strategy: |
        Audit the model on the actual deployment population using subgroup-stratified metrics
        (e.g., FairFace-style race / gender / age splits) before any use. Avoid sensitive
        class designs (crime, threat, moral judgement) entirely.
    - name: "Surveillance and identification risks"
      mitigation_strategy: |
        Do not deploy CLIP for face recognition, person re-identification, or any surveillance
        application. The OpenAI model card explicitly lists these as out of scope.
    - name: "Toxic / copyrighted training content"
      mitigation_strategy: |
        Be aware that downstream outputs (e.g., generations conditioned on CLIP embeddings) can
        surface memorized or stylistically copied material from the WIT crawl. Add content
        filters and rights-clearance review before publishing derived artifacts.
    - name: "English-only competence"
      mitigation_strategy: |
        Restrict deployment to English text prompts, or use multilingual CLIP variants
        (e.g., M-CLIP, SigLIP multilingual) for non-English use cases."

  out_of_scope_uses:
    - description: |
        Any deployed (commercial or non-commercial) production use case is declared out of
        scope by the OpenAI authors until further per-deployment testing has been done.
    - description: "Face recognition, person identification, and person verification"
    - description: "Surveillance, watch-listing, or law-enforcement profiling"
    - description: "Demographic classification (race, gender, age) outside of research contexts"
    - description: "Non-English image / text applications without further training and evaluation"
    - description: |
        Any classification taxonomy whose categories themselves embed social judgement
        (e.g., crime, threat, attractiveness, moral character).
    - description: "Clinical or diagnostic medical imaging without dedicated retraining and regulatory clearance"

bias_model: |
  Inherits the geographic, demographic, linguistic, and cultural biases of its WIT training
  corpus, which skews Western, English-speaking, younger, and male. The CLIP paper's FairFace
  probes show substantial disparities by race and gender when the class taxonomy includes
  socially-loaded categories (e.g., "criminal," "thief," non-human categories applied to
  faces). Researchers also report stereotyped associations between gendered prompts and
  occupation labels. No fairness mitigations were applied during training.
bias_output: |
  Outputs are 512-d embeddings whose geometry reflects the contrastive training distribution:
  cosine similarities can encode and amplify stereotyped associations between identity terms
  and concepts (gender / occupation, race / criminality). Zero-shot classification probabilities
  are not calibrated for any specific downstream task and should not be interpreted as
  trustworthy uncertainty estimates without per-deployment recalibration on representative data.
