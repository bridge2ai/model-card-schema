model_parameters:
  model_architecture: |
    Transformer-based protein language model: 650M-parameter SaProt_650M_AF2 base (ESM-style encoder
    augmented with structure-aware vocabulary from AlphaFold2 Foldseek tokens). Fine-tuning uses
    LoRA (rank 16, alpha 32, dropout 0) targeting attention query/key/value projections and the
    feedforward dense layers (intermediate.dense and output.dense). A linear classifier head
    projects pooled representations to 10 subcellular-localization classes.

  data:
    - name: "DeepLoc subcellular localization dataset (SaProtHub mirror)"
      link: "https://huggingface.co/datasets/SaProtHub/Dataset-Subcellular_Localization-DeepLoc"
      description: |
        DeepLoc 2.0 benchmark: SwissProt proteins with experimentally-annotated subcellular
        localizations spanning 10 classes. Train/validation/test splits provided by the SaProtHub
        mirror; structure-aware (SA) sequences are pre-computed from AlphaFold2 predictions.
      sensitive:
        sensitive_data:
          - "No human PII; SwissProt protein sequences only"

  input_format: "Structure-aware (SA) protein sequence — amino-acid sequence interleaved with AlphaFold2 Foldseek structural tokens"
  input_format_map:
    - key: "type"
      value: "string"
    - key: "encoding"
      value: "SA-vocabulary (amino acids + structural tokens)"
    - key: "max_length"
      value: "model-dependent (typically 1024 SA-tokens)"
  output_format: "Classification label (integer 0-9) corresponding to one of ten subcellular localization classes"
  output_format_map:
    - key: "shape"
      value: "[B, 10]"
    - key: "interpretation"
      value: "raw logits over {nucleus, cytoplasm, extracellular, mitochondrion, cell_membrane, endoplasmic_reticulum, plastid, golgi, lysosome_vacuole, peroxisome}"

  training_procedure:
    description: |
      LoRA fine-tuning of SaProt_650M_AF2 on the DeepLoc subcellular-localization train split,
      with the classifier head trained from scratch. Mixed precision (FP16) on a single GPU.
    reproducibility_info:
      hyperparameters:
        optimizer: "AdamW"
        learning_rate: 0.0005
        batch_size: 64
        training_epochs: 100
        loss_function: "Cross-entropy over 10 classes"
        optimization_techniques:
          - "LoRA rank=16"
          - "LoRA alpha=32"
          - "LoRA dropout=0"
          - "Mixed precision FP16"
          - "AdamW betas=(0.9, 0.98)"
          - "weight_decay=0.01"

quantitative_analysis:
  performance_metrics:
    - type: "test accuracy"
      value: 85.75
