schema_version: "0.0.2"

model_details:
  name: "SaProtHub SubCell Localization 650M (LoRA-fine-tuned SaProt)"
  short_description: "Protein-level classifier predicting subcellular localization across ten cellular compartments using a LoRA-fine-tuned 650M-parameter structure-aware protein language model."
  overview: |
    This model classifies protein sequences into one of ten subcellular localization classes:
    nucleus, cytoplasm, extracellular space, mitochondrion, cell membrane, endoplasmic reticulum,
    plastid, Golgi apparatus, lysosome/vacuole, and peroxisome.

    It is a LoRA (Low-Rank Adaptation) fine-tune of westlake-repl/SaProt_650M_AF2 — a 650M-parameter
    structure-aware protein language model that incorporates AlphaFold2 structural tokens alongside
    the amino-acid sequence. LoRA is applied to the query/key/value attention projections and the
    feedforward dense layers, with a small classifier head added on top.

    The model achieves 85.75% test-set accuracy on the DeepLoc subcellular localization benchmark.
  documentation: |
    ## Architecture
    - Base model: westlake-repl/SaProt_650M_AF2 (650M parameters)
    - Adaptation: LoRA on attention projections (Q/K/V) + FFN dense layers
    - LoRA rank: 16, alpha: 32, dropout: 0
    - Classifier head: 10-way over subcellular localization classes
    - Inherited input: structure-aware (SA) sequence — amino-acid sequence + AlphaFold2 structure tokens

    ## Usage
    ```python
    from saprot_hub import load_model
    model = load_model("SaProtHub/Model-Subcellular_Localization-650M")
    # Input: SA-sequence (protein sequence with structure annotations)
    pred = model.predict(sa_sequence)  # 0-9 class label
    ```

    ## Training Configuration
    - Optimizer: AdamW (β1=0.9, β2=0.98, weight_decay=0.01)
    - Learning rate: 5e-4
    - Epochs: 100
    - Batch size: 64
    - Precision: 16-bit mixed
