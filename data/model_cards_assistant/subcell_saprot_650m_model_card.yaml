considerations:
  users:
    - description: |
        Structural biologists and bioinformaticians who want quick subcellular localization
        predictions for protein sequences with known or predicted structure; researchers
        building protein-annotation pipelines.

  use_cases:
    - description: "Predicting subcellular localization for protein-annotation pipelines"
    - description: "Filtering proteomics candidates by compartment of interest"
    - description: "Benchmarking against DeepLoc 2.0 on the same 10-class taxonomy"
    - description: "Educational reference for LoRA fine-tuning of protein language models"

  limitations:
    - description: |
        Trained on SwissProt-curated proteins with experimentally-validated subcellular labels;
        coverage of organism diversity is uneven (heavily human / E. coli / yeast biased).
    - description: |
        Requires structure-aware input — sequences without AlphaFold2 structural tokens cannot
        be scored directly. Predictions for novel proteins without structural neighbors may be
        unreliable.
    - description: |
        10-way classification only; many proteins localize to multiple compartments. The model
        cannot express multi-label outputs without retraining with a multi-label objective.

  tradeoffs:
    - description: |
        650M-parameter base provides higher accuracy than the 35M variant (85.75% vs ~80%) at
        higher inference cost. LoRA keeps trainable parameter count small (~few M) but base
        weights still need to be loaded.

  ethical_considerations:
    - name: "Mis-localization in drug discovery pipelines"
      mitigation_strategy: |
        Treat predictions as a screening hypothesis, not ground truth. Confirm with experimental
        localization (immunofluorescence, fractionation, etc.) before acting on a prediction in
        downstream pharmacology or therapeutic targeting.

  out_of_scope_uses:
    - description: "Diagnosing localization-related diseases without experimental confirmation"
    - description: "Predicting localization in species or kingdoms underrepresented in DeepLoc"
    - description: "Multi-label localization prediction (model is single-label)"

bias_model: |
  Predictions reflect the species and protein-family distribution of the DeepLoc training set
  (SwissProt-biased toward extensively-studied model organisms). Performance on understudied
  proteomes and disordered / signal-peptide-containing proteins is not characterized.
bias_output: |
  Class prior matches the DeepLoc training distribution — rare compartments (peroxisome,
  plastid) are likely under-predicted relative to their true biological frequency.
