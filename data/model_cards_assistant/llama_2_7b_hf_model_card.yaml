model_parameters:
  model_architecture: |
    Auto-regressive decoder-only transformer ("Llama" architecture). 32 transformer layers,
    hidden size 4096, 32 attention heads (standard multi-head attention; 7B does NOT use
    Grouped-Query Attention — GQA is used only on the 70B variant). FFN with SwiGLU activation,
    RMSNorm pre-normalization, Rotary Position Embeddings (RoPE), SentencePiece BPE tokenizer
    with a 32,000-token vocabulary, and a 4,096-token context window. ~6.74B trainable parameters.

  data:
    - name: "Llama 2 pretraining corpus (~2T tokens, publicly available online sources)"
      link: "https://arxiv.org/abs/2307.09288"
      description: |
        A new mix of publicly available online data totaling approximately 2 trillion tokens,
        collected through January 2023 (training conducted January – July 2023). Meta states
        the corpus excludes data from Meta's products and services and that efforts were made
        to remove data from sites known to contain large volumes of personal information.
        The exact source composition is not fully disclosed in the Llama 2 paper.
      sensitive:
        sensitive_data:
          - "Web-scraped text may incidentally contain personal names, contact information, and other PII"
          - "Meta reports up-sampling factual sources and removing sites with high PII volume, but residual PII risk remains"
      bias_input: |
        Training data is predominantly English (Llama 2 paper reports ~89.7% English by token count,
        with very small fractions of other languages and ~8.4% code). It reflects the demographic,
        cultural, political, and topical skew of large-scale English web text. Llama 2 Section 5
        (Responsibility) documents biases on gender, religion, race/ethnicity, sexual orientation,
        age, nationality, disability, physical appearance, and socioeconomic status as measured on
        BOLD and other benchmarks.
    - name: "Human preference & safety data for fine-tuned variants (chat/RLHF only)"
      link: "https://arxiv.org/abs/2307.09288"
      description: |
        Over 1 million human-annotated comparisons used for RLHF of the `*-chat` siblings.
        NOT used for this base model (`Llama-2-7b-hf`); listed here for context because the
        HuggingFace card discusses the family as a whole.
      bias_input: |
        Annotator demographics, instructions, and reward modeling decisions encode their own biases;
        these biases are inherited by the chat variants, not by this base 7B model.

  input_format: "UTF-8 text (English-dominant); SentencePiece BPE tokenization; up to 4096 tokens of context."
  input_format_map:
    - key: "modality"
      value: "text"
    - key: "tokenizer"
      value: "SentencePiece BPE, vocab=32000"
    - key: "max_context_tokens"
