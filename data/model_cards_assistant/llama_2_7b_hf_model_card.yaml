schema_version: "0.0.2"

model_details:
  name: "Llama-2-7B (meta-llama/Llama-2-7b-hf)"
  short_description: "7B-parameter pretrained decoder-only transformer base language model from Meta's Llama 2 family, distributed in HuggingFace Transformers format."
  overview: |
    Llama-2-7B is the 7-billion-parameter base (pretrained, non-instruction-tuned, non-chat) variant of
    Meta's Llama 2 family of large language models (Touvron et al., 2023; arXiv:2307.09288). It is an
    auto-regressive, decoder-only transformer trained from scratch on roughly 2 trillion tokens of
    publicly available text data, with a 4,096-token context window.

    This particular checkpoint (`meta-llama/Llama-2-7b-hf`) is the official Meta release converted into
    HuggingFace Transformers format so it can be loaded directly with `AutoModelForCausalLM` /
    `AutoTokenizer`. It is intended as a foundation model for further fine-tuning, instruction-tuning,
    or research; the `Llama-2-7b-chat-hf` sibling is the RLHF-aligned chat variant. Llama 2 was
    released July 18, 2023 and is governed by the Llama 2 Community License (not an OSI / SPDX license).
  documentation: |
    ## Model Architecture
    - Family: Llama 2
    - Type: Auto-regressive, decoder-only transformer (Llama architecture)
    - Parameters: ~6.74B (commonly referred to as 7B)
    - Hidden size: 4096
    - Layers: 32
    - Attention heads: 32 (standard multi-head attention; Grouped-Query Attention is used only on the 70B variant)
    - Context length: 4096 tokens
    - Vocabulary size: 32,000 (SentencePiece BPE tokenizer)
    - Positional encoding: Rotary Position Embeddings (RoPE)
    - Normalization: RMSNorm (pre-norm)
    - Activation: SwiGLU
    - Tied input/output embeddings: no

    ## Usage with HuggingFace Transformers
    ```python
    from transformers import AutoTokenizer, AutoModelForCausalLM
    import torch

    model_id = "meta-llama/Llama-2-7b-hf"
    tokenizer = AutoTokenizer.from_pretrained(model_id)
    model = AutoModelForCausalLM.from_pretrained(
        model_id,
        torch_dtype=torch.float16,
        device_map="auto",
    )
    inputs = tokenizer("The capital of France is", return_tensors="pt").to(model.device)
    out = model.generate(**inputs, max_new_tokens=32, do_sample=False)
    print(tokenizer.decode(out[0], skip_special_tokens=True))
    ```

    Access to the weights requires accepting the Llama 2 Community License on the HuggingFace
    model page and on ai.meta.com.

    ## Citation
    See `model_details.citations` and `model_details.references`.
