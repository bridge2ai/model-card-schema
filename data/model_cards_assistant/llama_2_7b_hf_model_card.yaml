    - key: "dtype"
      value: "float16 / bfloat16 / float32 weights available"
  output_format: "Auto-regressive token-by-token text generation (logits over the 32k-token vocabulary)."
  output_format_map:
    - key: "shape"
      value: "[B, T, 32000]"
    - key: "interpretation"
      value: "Next-token logits; apply softmax/temperature/top-p sampling for generation."
    - key: "modality"
      value: "text"

  training_procedure:
    methodology: |
      Standard causal language-modeling pretraining (next-token prediction) on ~2T tokens of
      publicly available web text. Trained with the AdamW optimizer (beta1=0.9, beta2=0.95,
      eps=1e-5), cosine learning-rate schedule with warmup, peak LR 3.0e-4 for the 7B model,
      weight decay 0.1, gradient clipping 1.0. Context length 4096. No supervised fine-tuning
      and no RLHF on this base checkpoint (those are applied to the `*-chat` siblings).
    reproducibility_info:
      random_seed: 42
      environment_config: |
        Training conducted between January 2023 and July 2023 on Meta's internal Research
        Super Cluster as well as production GPU clusters. Custom training stack on top of PyTorch.
      hyperparameters:
        optimizer: "AdamW (beta1=0.9, beta2=0.95, eps=1e-5), weight decay 0.1, gradient clipping 1.0"
        loss_function: "Cross-entropy over next-token prediction (causal LM)"
        learning_rate: 0.0003
        batch_size: 4194304
        training_steps: 500000
        stopping_criterion: "Fixed token budget (~2T tokens) following a cosine LR schedule with 2000 warmup steps."
        optimization_techniques:
          - "Mixed-precision training (bf16)"
          - "Gradient clipping (max-norm 1.0)"
          - "Cosine learning-rate schedule with warmup"
          - "FlashAttention"

