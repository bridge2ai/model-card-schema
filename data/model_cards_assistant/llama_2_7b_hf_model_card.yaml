considerations:
  users:
    - description: |
        ML researchers and engineers building on a permissively-licensed (Llama 2 Community License)
        base LLM — for instruction tuning, RLHF / DPO, domain adaptation, retrieval-augmented
        generation, evaluation harnesses, or interpretability research.
    - description: |
        Commercial developers building English-language assistant, summarization, classification,
        or code-assistance products, subject to the Llama 2 Community License and Acceptable Use Policy.
    - description: |
        Educators and students using a mid-sized open-weights LLM as a teaching artifact for
        transformer architectures, scaling laws, and alignment research.

  use_cases:
    - description: "Base model for downstream supervised fine-tuning (SFT) and instruction tuning."
    - description: "Base model for RLHF / DPO / preference optimization research."
    - description: "Embedding extraction and representation learning for English text."
    - description: "Few-shot and zero-shot English text generation, classification, and Q&A research."
    - description: "Retrieval-augmented generation (RAG) backbone in English-language pipelines."

  limitations:
    - description: |
        English-dominant: the Llama 2 paper reports ~89.7% English tokens with negligible coverage
        of most other languages. Performance and safety on non-English inputs is materially worse and
        was not systematically evaluated by Meta.
    - description: |
        Knowledge cutoff: pretraining data was collected through early 2023; the model has no
        knowledge of events after that and will confidently hallucinate facts about more recent events.
    - description: |
        Base (non-chat) model: not aligned via SFT or RLHF. It will not follow instructions reliably,
        may produce unsafe, biased, or low-quality completions, and is not suitable for direct
        end-user deployment without further fine-tuning and safety mitigations.
    - description: |
        4096-token context window — short by 2026 standards. Long-document tasks require windowing,
        retrieval, or context-length extension (RoPE scaling, YaRN, etc.).
    - description: |
        Known issues with hallucination, sycophancy, and reasoning errors typical of mid-2023 LLMs
        of this scale. Math and code performance (GSM8K 14.6%, HumanEval 12.8%) is significantly
        below larger or more modern models.

  tradeoffs:
    - description: |
        Capability vs. safety/fairness: as the base (non-RLHF) checkpoint, Llama-2-7B has higher raw
        flexibility and better baseline perplexity than the `-chat` variant, but at the cost of
        safety alignment. ToxiGen toxicity (21.25%) is substantially higher than the chat variant
        (≈0% for Llama-2-7b-chat per the paper). Downstream developers must explicitly trade off
        accuracy against fairness/safety mitigation strength when fine-tuning — overly aggressive
        safety filters reduce helpfulness on legitimate prompts, while weak filters leave toxicity
        and demographic-bias risks unaddressed.
    - description: |
        Size vs. quality: at 7B parameters, Llama-2-7B trails Llama-2-13B and Llama-2-70B by 5-20
        points on most reasoning benchmarks but is roughly 2x and 10x cheaper to run, respectively.
        For latency-/cost-sensitive applications the 7B is often the right operating point.
    - description: |
        Quantization tradeoff: 4-bit / 8-bit quantization (bitsandbytes, GPTQ, AWQ) reduces VRAM
        by 2-4x with small (<2 pt) accuracy loss on most benchmarks, enabling single-consumer-GPU
        inference at the cost of some quality.
    - description: |
        Context vs. compute: the 4096-token window can be extended via RoPE scaling or YaRN, but
        extension typically requires further fine-tuning and degrades short-context performance.

  ethical_considerations:
    - name: "Toxic and hateful generations"
      mitigation_strategy: |
        Base model exhibits 21.25% toxicity on ToxiGen prompts. Deployers should apply downstream
        safety mitigations (classifier-based filtering, RLHF / DPO alignment, prompt-level guards,
        Llama Guard, or moderation APIs) before user-facing deployment.
    - name: "Misinformation and hallucination"
      mitigation_strategy: |
        TruthfulQA shows only 33.29% truthful-AND-informative responses. Deployers should ground
        outputs with retrieval, citations, or fact-checking, and clearly disclose AI-generated
        content. Do not use for medical, legal, financial, or other high-stakes advisory tasks
        without expert review.
    - name: "Demographic and cultural bias"
      mitigation_strategy: |
        Documented biases on gender, race, religion, nationality, and other axes (Llama 2 paper §5,
        BOLD benchmark). Deployers should run subgroup-level evaluation on their target population
        and apply bias mitigation (counterfactual data augmentation, fairness-constrained fine-tuning).
    - name: "Privacy and PII"
      mitigation_strategy: |
        Web-scraped pretraining data may have memorized PII. Avoid prompting the model to elicit
        personal information about identifiable individuals; apply output PII scrubbing in
        production deployments.
    - name: "Dual use and disinformation"
      mitigation_strategy: |
        A capable English text generator can be misused for spam, phishing, or coordinated
        disinformation. Compliance with the Meta Acceptable Use Policy is mandatory, and
        deployers should implement rate-limiting, abuse detection, and content provenance signals.
    - name: "Environmental impact"
      mitigation_strategy: |
        Pretraining the 7B emitted an estimated 31.22 tCO2eq (Meta states 100% offset). Downstream
        fine-tuning and inference still consume energy; consider efficiency techniques (LoRA,
        QLoRA, quantization, distillation) and report compute footprint per the Llama 2 paper.

  out_of_scope_uses:
    - description: "Use in any way that violates the Llama 2 Community License Agreement or Meta's Acceptable Use Policy."
    - description: "Commercial deployment by an entity with more than 700 million monthly active users (as of the Llama 2 release date) without a separate license from Meta."
    - description: "Use in non-English-dominant deployments without additional language-specific evaluation and fine-tuning; the model was tested almost exclusively on English."
    - description: "Generation of disinformation, propaganda, deceptive synthetic media, spam, or coordinated inauthentic behavior."
    - description: "Generation of harmful content including CSAM, content that sexualizes minors, harassment, hate speech, or content that incites violence or self-harm."
    - description: "High-stakes autonomous decision-making without human oversight (medical diagnosis, legal judgments, financial-trading decisions, hiring/firing, credit scoring, criminal-justice risk assessment, immigration decisions, safety-critical control systems)."
    - description: "Generation of malware, exploitation code, weapons-development guidance, or instructions for activities prohibited by applicable laws or regulations."
    - description: "Surveillance, biometric identification, or social-scoring applications targeting individuals or groups."
    - description: "User-facing chat / assistant deployments using the bare base checkpoint without further safety alignment (use `Llama-2-7b-chat-hf` or perform your own SFT+RLHF/DPO+safety tuning first)."
    - description: "Use that violates applicable laws or regulations (including trade-compliance laws) in any jurisdiction of deployment."

bias_model: |
  Llama-2-7B inherits the demographic, cultural, geographic, political, and topical biases of its
  ~2T-token English-dominant web pretraining corpus. The Llama 2 paper (Section 5, Responsibility)
  documents measurable bias on gender, religion, race/ethnicity, sexual orientation, age,
  nationality, disability, physical appearance, and socioeconomic status using the BOLD benchmark,
  and reports a 21.25% toxicity rate on ToxiGen prompts and only 33.29% truthful-AND-informative
  responses on TruthfulQA. As a base (non-RLHF) checkpoint, no safety alignment has been applied;
  the model is materially more biased and toxic than the `Llama-2-7b-chat-hf` sibling. Users should
  perform their own subgroup-level fairness audits on the populations and tasks of interest before
  deployment.
bias_output: |
  Outputs are predominantly English (~89.7% of pretraining tokens) and reflect a Western,
  Anglophone, internet-skewed worldview. Generations may reproduce stereotypes about gender,
  race, religion, nationality, and other protected attributes; may amplify majority viewpoints
  on contested political and cultural topics; and may confidently state false or fabricated facts
  (hallucination), especially regarding people, recent events (post-cutoff: early 2023), specialized
  domains, and non-English content. The base checkpoint is not calibrated for any specific task
  or population, has no instruction-following safety alignment, and should not be deployed in
  user-facing applications without downstream fine-tuning, safety filtering, and task-appropriate
  evaluation.
