schema_version: "0.0.2"

model_details:
  name: "DenseNet-121 (timm/densenet121.tv_in1k)"
  short_description: "DenseNet image classification model trained on ImageNet-1k (original torchvision weights, distributed via timm)."
  overview: |
    DenseNet-121 is a densely connected convolutional network (Huang et al., CVPR 2017) where every layer
    receives feature maps from all preceding layers and passes its own feature maps to all subsequent layers.
    This dense connectivity pattern alleviates the vanishing-gradient problem, strengthens feature
    propagation, encourages feature reuse, and substantially reduces the parameter count compared to
    traditional CNNs of similar depth.

    This particular checkpoint (`timm/densenet121.tv_in1k`) is the original torchvision weights repackaged
    under the timm (PyTorch Image Models) ecosystem so it can be loaded with timm's unified model API.
    It is trained on the ImageNet-1k classification benchmark (1.28M training images across 1000 classes).
  documentation: |
    ## Model Architecture
    - Backbone: DenseNet-121 with four dense blocks
    - Growth rate: 32 (feature maps added per layer)
    - Total parameters: ~8.0M
    - Compute: 2.9 GMACs at 224x224
    - Activations: 6.9M
    - Input resolution: 224 x 224

    ## Usage with timm
    ```python
    import timm
    model = timm.create_model("densenet121.tv_in1k", pretrained=True)
    model.eval()
    ```

    The model also exposes feature-extraction modes (forward_features, forward_head) for use as a
    backbone in detection, segmentation, or transfer learning pipelines.

    ## Citation
    See model_details.citations and model_details.references.
