model_parameters:
  model_architecture: |
    DenseNet-121 architecture with 4 dense blocks (each with growth rate 32) interleaved with
    transition layers (1x1 conv + 2x2 average pool). Total ~8.0M parameters, ~2.9 GMACs at 224x224.
    Final 1000-way classifier head trained on ImageNet-1k.

  data:
    - name: "ImageNet-1k (ILSVRC2012)"
      link: "https://www.image-net.org/"
      description: |
        1,281,167 training images and 50,000 validation images across 1000 object categories.
        Used for both training and ImageNet-1k accuracy evaluation.
      sensitive:
        sensitive_data:
          - "No PII in labels; some person-class images contain incidental faces"
      bias_input: |
        ImageNet-1k has documented geographic and demographic skew (Western-centric, English-speaking
        contributors); some classes overlap with person/identity categories. See Crawford & Paglen 2019,
        Yang et al. 2020 for analyses.

  input_format: "RGB images, 224x224, normalized with ImageNet mean/std"
  input_format_map:
    - key: "shape"
      value: "[B, 3, 224, 224]"
    - key: "dtype"
      value: "float32"
    - key: "normalization"
      value: "mean=[0.485, 0.456, 0.406], std=[0.229, 0.224, 0.225]"
  output_format: "1000-way classification logits"
  output_format_map:
