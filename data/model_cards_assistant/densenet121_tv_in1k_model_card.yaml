considerations:
  users:
    - description: |
        ML researchers and engineers using DenseNet-121 as a baseline for image-classification
        benchmarks, a feature backbone for transfer learning, or a building block in detection
        and segmentation pipelines.

  use_cases:
    - description: "ImageNet-1k image classification baseline"
    - description: "Transfer learning backbone for downstream computer-vision tasks"
    - description: "Feature extraction (forward_features) for use in detection / segmentation"
    - description: "Educational reference implementation of densely-connected architectures"

  limitations:
    - description: |
        Trained on ImageNet-1k only; out-of-distribution performance on non-ImageNet domains
        (medical imaging, satellite imagery, microscopy) is unknown without further fine-tuning.
    - description: |
        Reflects biases known to be present in the ImageNet-1k label space: skewed object-class
        distribution, Western-centric representation, label noise on visually-similar classes.
    - description: |
        Original 2017-era torchvision training recipe; modern recipes (RandAugment, MixUp,
        Knowledge Distillation, longer training) can substantially raise these baselines.

  tradeoffs:
    - description: |
        Compared to ResNet-50 (25M params), DenseNet-121 reaches similar accuracy with ~1/3 the
        parameters but slower wall-clock inference due to memory-bandwidth-heavy dense connections.

  ethical_considerations:
    - name: "ImageNet representation bias"
      mitigation_strategy: |
        Downstream deployers should audit the model on their target population and consult
        the ImageNet Roulette / Buolamwini-style analyses on class distribution before
        deploying for use cases that touch person classes.

  out_of_scope_uses:
    - description: "Face recognition / identification"
    - description: "Demographic classification (age, gender, ethnicity)"
    - description: "Surveillance applications"
    - description: "Clinical / medical diagnosis without dedicated retraining and regulatory clearance"

bias_model: |
  Inherits the geographic / demographic skew of its training data. No fairness audit was
  performed by the original DenseNet authors. Users should run their own slice-level evaluation
  on relevant subpopulations before deployment.
bias_output: |
  Logit calibration follows the ImageNet-1k class prior; rare classes may be under-predicted.
  Not calibrated for any specific downstream task.
