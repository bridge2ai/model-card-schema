<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"
     font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1d4ed8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="#ffffff"/>

  <!-- Title -->
  <text x="960" y="100" text-anchor="middle" font-size="56" font-weight="800" fill="#1e3a8a">
    Zoom · Model Card Generation
  </text>
  <text x="960" y="160" text-anchor="middle" font-size="26" fill="#475569">
    Model docs (HF Hub · GitHub · papers · DOIs) → Model Card YAML
  </text>

  <!-- Sources row -->
  <rect x="100" y="220" width="1720" height="110" rx="16" ry="16"
        fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="140" y="265" font-size="28" font-weight="700" fill="#92400e">Sources</text>
  <text x="140" y="305" font-size="22" fill="#78350f">
    HuggingFace Hub README  ·  GitHub MODEL_CARD.md  ·  papers (arXiv)  ·  DOIs (ARTL MCP)  ·  KOGUT docs  →  preprocessed + concatenated per project
  </text>

  <!-- arrow -->
  <line x1="960" y1="335" x2="960" y2="385" stroke="#1d4ed8" stroke-width="8" marker-end="url(#arrow)"/>

  <!-- Method panel -->
  <rect x="100" y="400" width="1720" height="500" rx="20" ry="20"
        fill="#eff6ff" stroke="#1d4ed8" stroke-width="4"/>
  <text x="140" y="450" font-size="32" font-weight="800" fill="#1e3a8a">Generation methods</text>

  <!-- Star method -->
  <rect x="140" y="480" width="540" height="180" rx="14" ry="14"
        fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="410" y="528" text-anchor="middle" font-size="28" font-weight="800" fill="#1e3a8a">
    ★ mc-agent
  </text>
  <text x="410" y="570" text-anchor="middle" font-size="22" fill="#1e3a8a">parallel sub-agents per section</text>
  <text x="410" y="605" text-anchor="middle" font-size="22" fill="#1e3a8a">deterministic · highest quality</text>
  <text x="410" y="640" text-anchor="middle" font-size="20" fill="#1e40af" font-style="italic">/mc-agent skill</text>

  <!-- Assistant -->
  <rect x="700" y="480" width="540" height="180" rx="14" ry="14"
        fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="970" y="528" text-anchor="middle" font-size="28" font-weight="800" fill="#1e3a8a">
    mc-assistant
  </text>
  <text x="970" y="570" text-anchor="middle" font-size="22" fill="#1e3a8a">interactive, human-in-the-loop</text>
  <text x="970" y="605" text-anchor="middle" font-size="22" fill="#1e3a8a">good for refinement</text>
  <text x="970" y="640" text-anchor="middle" font-size="20" fill="#1e40af" font-style="italic">/mc-assistant skill</text>

  <!-- GitHub Assistant -->
  <rect x="1260" y="480" width="540" height="180" rx="14" ry="14"
        fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="1530" y="528" text-anchor="middle" font-size="28" font-weight="800" fill="#1e3a8a">
    GitHub @modelcardassistant
  </text>
  <text x="1530" y="570" text-anchor="middle" font-size="22" fill="#1e3a8a">triggered by issue / PR mention</text>
  <text x="1530" y="605" text-anchor="middle" font-size="22" fill="#1e3a8a">URL / DOI ingest modes</text>
  <text x="1530" y="640" text-anchor="middle" font-size="20" fill="#1e40af" font-style="italic">opens PR with card + portfolio diff</text>

  <!-- HF Hub direct -->
  <rect x="140" y="690" width="380" height="180" rx="14" ry="14"
        fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="330" y="738" text-anchor="middle" font-size="26" font-weight="800" fill="#0c4a6e">HF Hub direct</text>
  <text x="330" y="780" text-anchor="middle" font-size="20" fill="#0c4a6e">README → Model Card</text>
  <text x="330" y="815" text-anchor="middle" font-size="20" fill="#0c4a6e">densenet121, SaProt, …</text>

  <!-- Canonical -->
  <rect x="540" y="690" width="380" height="180" rx="14" ry="14"
        fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="730" y="738" text-anchor="middle" font-size="26" font-weight="800" fill="#92400e">Canonical / curated</text>
  <text x="730" y="780" text-anchor="middle" font-size="20" fill="#78350f">DOE climate-extended</text>
  <text x="730" y="815" text-anchor="middle" font-size="20" fill="#78350f">gold reference</text>

  <!-- Floor anchors -->
  <rect x="940" y="690" width="380" height="180" rx="14" ry="14"
        fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="1130" y="738" text-anchor="middle" font-size="26" font-weight="800" fill="#92400e">Floor anchors (fixtures)</text>
  <text x="1130" y="780" text-anchor="middle" font-size="20" fill="#78350f">minimal · minimal-viable</text>
  <text x="1130" y="815" text-anchor="middle" font-size="20" fill="#78350f">rubric calibration</text>

  <!-- Tooling -->
  <rect x="1340" y="690" width="460" height="180" rx="14" ry="14"
        fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <text x="1570" y="730" text-anchor="middle" font-size="24" font-weight="800" fill="#7c2d12">make targets</text>
  <text x="1570" y="770" text-anchor="middle" font-size="20" fill="#7c2d12">gen-project · test · lint</text>
  <text x="1570" y="800" text-anchor="middle" font-size="20" fill="#7c2d12">gendoc · serve</text>
  <text x="1570" y="835" text-anchor="middle" font-size="18" fill="#9a3412" font-style="italic">regenerates JSON / OWL / Python / …</text>

  <!-- Output band -->
  <line x1="960" y1="900" x2="960" y2="950" stroke="#1d4ed8" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="100" y="965" width="1720" height="80" rx="14" ry="14"
        fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <text x="960" y="1015" text-anchor="middle" font-size="26" font-weight="700" fill="#7c2d12">
    Model Card YAML  ·  data/model_cards_assistant/, …_concatenated/, …_individual/  ·  blocked by CI gate before merge
  </text>
</svg>
