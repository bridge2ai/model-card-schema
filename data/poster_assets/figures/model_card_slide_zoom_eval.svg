<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"
     font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-eval" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6d28d9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="#ffffff"/>

  <!-- Title -->
  <text x="960" y="100" text-anchor="middle" font-size="56" font-weight="800" fill="#4c1d95">
    Zoom · Rubric Evaluation (Hybrid + LLM)
  </text>
  <text x="960" y="160" text-anchor="middle" font-size="26" fill="#475569">
    Two axes:  which rubric (10 vs 20)  ×  which evaluator (hybrid rule-based vs LLM judge)
  </text>

  <!-- Frame -->
  <rect x="100" y="210" width="1720" height="640" rx="22" ry="22"
        fill="#f5f3ff" stroke="#6d28d9" stroke-width="4"/>

  <!-- Column headers -->
  <text x="780" y="280" text-anchor="middle" font-size="32" font-weight="800" fill="#7c2d12">Hybrid (rule-based)</text>
  <text x="780" y="312" text-anchor="middle" font-size="20" fill="#78350f">deterministic · free · &lt;1 s  ·  runs in CI gate</text>

  <text x="1380" y="280" text-anchor="middle" font-size="32" font-weight="800" fill="#4c1d95">LLM judge</text>
  <text x="1380" y="312" text-anchor="middle" font-size="20" fill="#5b21b6">mc-rubric{10,20}(-semantic)  ·  Sonnet 4.5 · T=0.0</text>

  <!-- Row labels -->
  <text x="320" y="495" text-anchor="middle" font-size="36" font-weight="800" fill="#4c1d95">rubric10</text>
  <text x="320" y="535" text-anchor="middle" font-size="20" fill="#5b21b6">10 elements × 5 sub</text>
  <text x="320" y="565" text-anchor="middle" font-size="20" fill="#5b21b6">max 50 pts · coarse</text>

  <text x="320" y="745" text-anchor="middle" font-size="36" font-weight="800" fill="#4c1d95">rubric20</text>
  <text x="320" y="785" text-anchor="middle" font-size="20" fill="#5b21b6">20 questions, 4 cats:</text>
  <text x="320" y="810" text-anchor="middle" font-size="18" fill="#5b21b6">Struct · Meta · Tech · FAIR</text>

  <!-- Matrix cells -->
  <!-- top-left: R10 × hybrid -->
  <rect x="520" y="350" width="520" height="240" rx="14" ry="14"
        fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
  <text x="780" y="410" text-anchor="middle" font-size="26" font-weight="700" fill="#7c2d12">r10 × hybrid</text>
  <text x="780" y="455" text-anchor="middle" font-size="22" fill="#7c2d12">batch_evaluate_mc_rubric10_hybrid.py</text>
  <text x="780" y="495" text-anchor="middle" font-size="20" fill="#7c2d12">fast sanity check</text>
  <text x="780" y="530" text-anchor="middle" font-size="20" fill="#7c2d12">runs on every PR</text>

  <!-- top-right: R10 × LLM -->
  <rect x="1120" y="350" width="520" height="240" rx="14" ry="14"
        fill="#ddd6fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="1380" y="410" text-anchor="middle" font-size="26" font-weight="700" fill="#4c1d95">r10 × LLM</text>
  <text x="1380" y="455" text-anchor="middle" font-size="22" fill="#4c1d95">mc-rubric10 / mc-rubric10-semantic</text>
  <text x="1380" y="495" text-anchor="middle" font-size="20" fill="#5b21b6">deeper quality signal</text>
  <text x="1380" y="530" text-anchor="middle" font-size="20" fill="#5b21b6">on-demand · per card cost</text>

  <!-- bottom-left: R20 × hybrid -->
  <rect x="520" y="610" width="520" height="200" rx="14" ry="14"
        fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
  <text x="780" y="660" text-anchor="middle" font-size="26" font-weight="700" fill="#7c2d12">r20 × hybrid</text>
  <text x="780" y="700" text-anchor="middle" font-size="22" fill="#7c2d12">batch_evaluate_mc_rubric20_hybrid.py</text>
  <text x="780" y="735" text-anchor="middle" font-size="20" fill="#7c2d12">bakes in semantic findings</text>
  <text x="780" y="765" text-anchor="middle" font-size="18" fill="#7c2d12">Q18 leakage  ·  Q19 bias ↔ tradeoffs</text>

  <!-- bottom-right: R20 × LLM -->
  <rect x="1120" y="610" width="520" height="200" rx="14" ry="14"
        fill="#ddd6fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="1380" y="660" text-anchor="middle" font-size="26" font-weight="700" fill="#4c1d95">r20 × LLM</text>
  <text x="1380" y="700" text-anchor="middle" font-size="22" fill="#4c1d95">mc-rubric20 / mc-rubric20-semantic</text>
  <text x="1380" y="735" text-anchor="middle" font-size="20" fill="#5b21b6">gold-standard FAIR audit</text>
  <text x="1380" y="765" text-anchor="middle" font-size="18" fill="#5b21b6">surfaces rules to encode into hybrid</text>

  <!-- CI / portfolio strip below -->
  <rect x="100" y="880" width="1720" height="165" rx="14" ry="14"
        fill="#ffffff" stroke="#6d28d9" stroke-width="3"/>
  <text x="140" y="918" font-size="24" font-weight="800" fill="#4c1d95">CI &amp; portfolio</text>

  <text x="140" y="955" font-size="20" fill="#5b21b6">
    <tspan font-weight="700">mc-rubric20-gate.yml</tspan>  ·  blocking PR check, hybrid only (deterministic, no API key)
  </text>
  <text x="140" y="990" font-size="20" fill="#5b21b6">
    <tspan font-weight="700">mc-rubric20-portfolio-audit.yml</tspan>  ·  weekly cron  ·  rebuilds portfolio.html · badges · common_issues.md  ·  opens PR if anything changed
  </text>
  <text x="140" y="1025" font-size="20" fill="#5b21b6">
    Outputs: data/evaluation/{badges, all, extended, harmonized, hf_hub}/  ·  per-card SVG badge (rubric × evaluator) in README
  </text>
</svg>
