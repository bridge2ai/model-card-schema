<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"
     font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-gen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-exc" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#047857"/>
    </marker>
    <marker id="arrow-eval" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6d28d9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="#ffffff"/>

  <!-- Title -->
  <text x="960" y="120" text-anchor="middle" font-size="64" font-weight="800" fill="#0f172a">
    Model Cards Schema
  </text>
  <text x="960" y="180" text-anchor="middle" font-size="28" fill="#475569">
    LinkML schema · multi-method generation · D4D harmonization · hybrid + LLM rubric evaluation
  </text>

  <!-- 1. Generation (left pillar) -->
  <rect x="100" y="290" width="500" height="600" rx="22" ry="22"
        fill="#eff6ff" stroke="#1d4ed8" stroke-width="5"/>
  <text x="350" y="370" text-anchor="middle" font-size="44" font-weight="800" fill="#1e3a8a">1 · Generation</text>
  <text x="350" y="470" text-anchor="middle" font-size="30" font-weight="700" fill="#1e40af">mc-agent ★</text>
  <text x="350" y="530" text-anchor="middle" font-size="26" fill="#1e40af">GitHub @modelcardassistant</text>
  <text x="350" y="590" text-anchor="middle" font-size="26" fill="#1e40af">mc-assistant</text>
  <text x="350" y="650" text-anchor="middle" font-size="26" fill="#1e40af">HF Hub · canonical · fixtures</text>
  <text x="350" y="780" text-anchor="middle" font-size="22" fill="#475569">README / paper / DOI sources</text>
  <text x="350" y="815" text-anchor="middle" font-size="22" fill="#475569">→ Model Card YAML</text>

  <!-- Model Card YAML hub (center) -->
  <rect x="720" y="440" width="380" height="270" rx="22" ry="22"
        fill="#fff7ed" stroke="#c2410c" stroke-width="5"/>
  <text x="910" y="510" text-anchor="middle" font-size="40" font-weight="800" fill="#7c2d12">Model Card</text>
  <text x="910" y="560" text-anchor="middle" font-size="40" font-weight="800" fill="#7c2d12">YAML</text>
  <text x="910" y="620" text-anchor="middle" font-size="24" fill="#9a3412">LinkML · 34 classes</text>
  <text x="910" y="665" text-anchor="middle" font-size="20" fill="#7c2d12">+ optional D4D refs</text>

  <!-- 2. Harmonization (top-right) -->
  <rect x="1220" y="290" width="600" height="270" rx="22" ry="22"
        fill="#ecfdf5" stroke="#047857" stroke-width="5"/>
  <text x="1520" y="370" text-anchor="middle" font-size="40" font-weight="800" fill="#064e3b">2 · D4D Harmonization</text>
  <text x="1520" y="445" text-anchor="middle" font-size="24" fill="#065f46">CreatorRef · DatasetRef · GrantRef</text>
  <text x="1520" y="490" text-anchor="middle" font-size="22" fill="#065f46">external references to D4D instances</text>
  <text x="1520" y="525" text-anchor="middle" font-size="20" fill="#065f46">document datasets once, reuse everywhere</text>

  <!-- 3. Eval (bottom-right) -->
  <rect x="1220" y="610" width="600" height="280" rx="22" ry="22"
        fill="#f5f3ff" stroke="#6d28d9" stroke-width="5"/>
  <text x="1520" y="690" text-anchor="middle" font-size="40" font-weight="800" fill="#4c1d95">3 · Rubric Evaluation</text>
  <text x="1520" y="760" text-anchor="middle" font-size="26" fill="#5b21b6">rubric10  ·  rubric20</text>
  <text x="1520" y="805" text-anchor="middle" font-size="24" fill="#5b21b6">hybrid (deterministic)  +  LLM judge</text>
  <text x="1520" y="845" text-anchor="middle" font-size="20" fill="#5b21b6">PR gate · weekly portfolio audit · badges</text>

  <!-- arrows -->
  <line x1="605" y1="590" x2="715" y2="590" stroke="#1d4ed8" stroke-width="6" marker-end="url(#arrow-gen)"/>
  <line x1="1105" y1="510" x2="1215" y2="430" stroke="#047857" stroke-width="6" marker-end="url(#arrow-exc)"/>
  <line x1="1105" y1="640" x2="1215" y2="745" stroke="#6d28d9" stroke-width="6" marker-end="url(#arrow-eval)"/>

  <!-- Bottom tagline -->
  <text x="960" y="990" text-anchor="middle" font-size="22" fill="#64748b" font-style="italic">
    Portfolio: climate-extended · climate-forecasting · sentiment · densenet121 · subcell-saprot · minimal fixtures
  </text>
</svg>
