id: https://w3id.org/linkml/modelcard
name: Model_Card_Harmonized
description: |-
  HARMONIZED VERSION: LinkML model card schema integrated with Datasheets for Datasets

  This harmonized schema demonstrates how to align the model cards schema with the
  datasheets for datasets schema (data_sheets_schema_all.yaml) to avoid duplication
  and leverage comprehensive dataset documentation.

  KEY CHANGES FROM modelcards.yaml:
  1. Imports datasheets schema for comprehensive dataset and creator documentation
  2. Replaces simple 'owner' class with datasheets Creator/Person/Organization
  3. Replaces simple 'dataSet' class with reference to datasheets Dataset
  4. Adds provenance tracking (created_by, modified_by, was_derived_from)
  5. Adds funding and maintainer references from datasheets
  6. Enhances ethics with datasheets PrivacyAndSecurity references
  7. Uses datasheets licensing classes for IP and regulatory restrictions

  MIGRATION NOTES:
  - Existing 'owner' instances should be migrated to datasheets Person/Organization
  - Existing 'dataSet' instances should be migrated to datasheets Dataset
  - The 'SensitiveData' class is deprecated in favor of datasheets PrivacyAndSecurity
  - All datasheets classes are available via the import

imports:
- linkml:types
# HARMONIZATION ACTION 1: Import datasheets schema to access 60+ classes
# This provides comprehensive dataset, creator, ethics, and provenance documentation
- ../../data-sheets-schema/src/data_sheets_schema/schema/data_sheets_schema_all

prefixes:
  modelcard: https://w3id.org/linkml/modelcard/
  linkml: https://w3id.org/linkml/
  datasheets: https://w3id.org/linkml/datasheets/

default_prefix: modelcard
default_range: string

# ============================================
# ENUMS
# ============================================

enums:
  CitationStyleEnum:
    description: Citation format styles
    permissible_values:
      MLA:
        description: Modern Language Association style
      APA:
        description: American Psychological Association style
      Chicago:
        description: Chicago Manual of Style
      IEEE:
        description: Institute of Electrical and Electronics Engineers style

# ============================================
# SLOTS (Global slot definitions)
# ============================================

slots:
  # Basic metadata
  name:
    description: Name or identifier
    range: string

  description:
    description: Textual description
    range: string

  contact:
    description: Contact information (email, URL, etc.)
    range: string

  # HARMONIZATION ACTION 6: Provenance tracking (from datasheets)
  created_by:
    description: Creator(s) who created this model card (references datasheets Person/Organization)
    range: datasheets:Creator
    multivalued: true
    comments:
      - "Use datasheets Person or Organization classes for full creator attribution"
      - "Supports ORCID, CRediT roles, institutional affiliations"

  modified_by:
    description: Person(s) who last modified this model card
    range: datasheets:Person
    multivalued: true

  created_on:
    description: Timestamp when this model card was created
    range: datetime

  modified_on:
    description: Timestamp when this model card was last modified
    range: datetime

  was_derived_from:
    description: Previous version or source model card this was derived from
    range: string
    comments:
      - "Can be a URL, identifier, or free text reference"

  # HARMONIZATION ACTION 7: Funding information (from datasheets)
  funded_by:
    description: Funding sources for model development (references datasheets Grant)
    range: datasheets:Grant
    multivalued: true
    comments:
      - "Use datasheets Grant class for comprehensive funding documentation"
      - "Includes grant number, funder, amount, investigator information"

  # Maintainer information
  maintainer:
    description: Current maintainer(s) of the model (references datasheets Person/Organization)
    range: datasheets:Creator
    multivalued: true
    comments:
      - "May differ from original creators"
      - "Use for active maintenance and support contact"

  # Version slots
  date:
    description: Date value
    range: date

  diff:
    description: Difference or changelog from previous version
    range: string

  # License slots
  identifier:
    description: SPDX license identifier (e.g., 'Apache-2.0', 'MIT')
    range: string

  custom_text:
    description: Custom license text (when not using SPDX identifier)
    range: string

  # Reference slots
  reference:
    description: Reference URL or citation string
    range: string

  # Citation slots
  style:
    description: Citation format style
    range: CitationStyleEnum

  citation:
    description: Formatted citation text
    range: string

  # ModelDetails slots
  overview:
    description: High-level model description
    range: string

  documentation:
    description: Detailed usage guide and documentation
    range: string

  # DEPRECATED: Use 'creators' instead of 'owners'
  # owners:
  #   description: DEPRECATED - Use 'creators' with datasheets Person/Organization
  #   multivalued: true

  # HARMONIZATION ACTION 2: Replace 'owners' with 'creators' using datasheets classes
  creators:
    description: Model creators and contributors (references datasheets Creator/Person/Organization)
    range: datasheets:Creator
    multivalued: true
    comments:
      - "Replaces the simple 'owner' class"
      - "Use datasheets Person for individuals (with ORCID, roles)"
      - "Use datasheets Organization for institutions"
      - "Supports CRediT contributor roles"

  version:
    description: Version information

  licenses:
    description: License information
    multivalued: true

  references:
    description: Related resources and references
    multivalued: true

  citations:
    description: Citation information for the model
    multivalued: true

  path:
    description: Storage location or path to model artifacts
    range: string

  # Dataset slots - NOTE: Most dataset documentation now handled by datasheets Dataset class
  link:
    description: URL to dataset
    range: uri

  # DEPRECATED: Use datasheets PrivacyAndSecurity instead
  # sensitive:
  #   description: DEPRECATED - Use datasheets PrivacyAndSecurity class

  graphics:
    description: Visualizations and graphics

  bias_input:
    description: Known biases in the input data
    range: string

  unit:
    description: Unit of measurement
    range: string

  # DEPRECATED: Use datasheets PrivacyAndSecurity class
  # sensitive_data:
  #   description: DEPRECATED - Use datasheets PrivacyAndSecurity

  # ModelParameters slots
  model_architecture:
    description: Model architecture specification
    range: string

  # HARMONIZATION ACTION 3: Dataset references use datasheets Dataset class
  training_data:
    description: Training datasets (references datasheets Dataset)
    range: datasheets:Dataset
    multivalued: true
    comments:
      - "Replaces simple 'data' slot with references to comprehensive datasheets Dataset"
      - "Each dataset gets full datasheets documentation: motivation, composition, collection, preprocessing, uses, distribution, maintenance"

  evaluation_data:
    description: Evaluation/test datasets (references datasheets Dataset)
    range: datasheets:Dataset
    multivalued: true
    comments:
      - "Separate tracking for evaluation datasets"

  input_format:
    description: Plain text input format specification
    range: string

  input_format_map:
    description: Structured input format mapping
    multivalued: true

  output_format:
    description: Plain text output format specification
    range: string

  output_format_map:
    description: Structured output format mapping
    multivalued: true

  # KeyVal slots
  key:
    description: Key in key-value pair
    range: string

  value:
    description: Value in key-value pair or metric value

  # Performance metric slots
  type:
    description: Type or category
    range: string

  value_error:
    description: Estimated error for the metric
    range: float

  confidence_interval:
    description: Confidence interval for the metric

  threshold:
    description: Decision threshold the metric was computed on
    range: float

  slice:
    description: Data slice identifier this metric was computed on
    range: string

  # ConfidenceInterval slots
  lower_bound:
    description: Lower bound of confidence interval
    range: float

  upper_bound:
    description: Upper bound of confidence interval
    range: float

  # Graphics slots
  collection:
    description: Collection of items
    multivalued: true

  image:
    description: Base64-encoded image (PNG format)
    range: string

  # QuantitativeAnalysis slots
  performance_metrics:
    description: Performance metrics and evaluation results
    multivalued: true

  # Considerations slots
  users:
    description: Intended users or user types
    multivalued: true

  use_cases:
    description: Intended use cases and application scenarios
    multivalued: true

  limitations:
    description: Known limitations and constraints
    multivalued: true

  tradeoffs:
    description: Performance tradeoffs and considerations
    multivalued: true

  ethical_considerations:
    description: Ethical considerations and risks
    multivalued: true

  # HARMONIZATION ACTION 5: Enhanced ethics with datasheets references
  privacy_security:
    description: Privacy and security considerations (references datasheets PrivacyAndSecurity)
    range: datasheets:PrivacyAndSecurity
    comments:
      - "Comprehensive privacy documentation from datasheets"
      - "Includes PII analysis, anonymization, consent, regulatory compliance"

  # Risk slots
  mitigation_strategy:
    description: Strategy to address or mitigate this risk
    range: string

  # ModelCard root slots
  schema_version:
    description: Version of the model card schema
    range: string

  model_category:
    description: Category or parent class of the model
    range: string

  model_details:
    description: Comprehensive model metadata
    required: true

  model_parameters:
    description: Model construction and architecture parameters

  quantitative_analysis:
    description: Quantitative analysis and performance evaluation

  considerations:
    description: Usage considerations, limitations, and ethical concerns

  bias_model:
    description: Known biases in the model
    range: string

  bias_output:
    description: Known biases in the model output
    range: string

  # HuggingFace/Community slots
  framework:
    description: ML framework (TensorFlow, PyTorch, JAX, Scikit-Learn, etc.)
    range: string

  framework_version:
    description: Version of the ML framework
    range: string

  library_name:
    description: Library name for loading the model (e.g., transformers, diffusers)
    range: string

  pipeline_tag:
    description: Task type (text-generation, image-classification, etc.)
    range: string

  language:
    description: Natural language(s) processed by the model
    multivalued: true
    range: string

  base_model:
    description: Parent model identifier (for fine-tuned models)
    range: string

  tags:
    description: Searchable keywords and tags
    multivalued: true
    range: string

  datasets:
    description: Training dataset identifiers
    multivalued: true
    range: string

  metrics:
    description: Evaluation metrics used
    multivalued: true
    range: string

  # Benchmark integration slots
  task:
    description: ML task specification

  dataset:
    description: Dataset information

  source:
    description: Source of information or results

  results:
    description: Benchmark or evaluation results
    multivalued: true

  model_index:
    description: Papers with Code model-index for benchmark tracking
    multivalued: true

  config:
    description: Configuration specification
    range: string

  split:
    description: Dataset split (train, test, validation)
    range: string

  revision:
    description: Dataset or model revision/version
    range: string

  args:
    description: Additional arguments or parameters

  url:
    description: URL reference
    range: uri

# ============================================
# CLASSES
# ============================================

classes:

  # ========== Core Metadata Classes ==========

  Version:
    description: Version information for a model
    slots:
      - name
      - date
      - diff
    slot_usage:
      name:
        description: Version identifier (e.g., '1.0.0', 'v2', 'beta')
        range: string
      date:
        description: Release date of this version
        range: date
      diff:
        description: Changes from the previous version
        range: string

  # HARMONIZATION ACTION 4: Enhanced licensing with datasheets classes
  License:
    description: |-
      License information (use SPDX identifier OR custom text, not both)

      HARMONIZATION NOTE: For comprehensive licensing including IP restrictions,
      regulatory controls, and export regulations, consider using:
      - datasheets:LicensingAndIntellectualProperty class
      - datasheets:RegulatoryRestrictions class
    slots:
      - identifier
      - custom_text
    slot_usage:
      identifier:
        description: SPDX license identifier (e.g., 'Apache-2.0', 'MIT', 'CC-BY-4.0')
        range: string
      custom_text:
        description: Custom license text (use when SPDX identifier is not applicable)
        range: string
    comments:
      - "For basic licensing, this class is sufficient"
      - "For detailed IP restrictions, export controls, or regulatory compliance, import and use datasheets LicensingAndIntellectualProperty"

  # DEPRECATED CLASS - Use datasheets Person/Organization instead
  # owner:
  #   description: |-
  #     DEPRECATED - Use datasheets Person or Organization classes instead
  #
  #     Migration: Replace references to 'owner' with datasheets:Person or datasheets:Organization
  #     Example:
  #       Old: owners: [{name: "John Doe", contact: "john@example.com"}]
  #       New: creators: [{given_name: "John", family_name: "Doe", email: "john@example.com", orcid: "0000-0001-..."}]
  #   slots:
  #     - name
  #     - contact

  Reference:
    description: Reference to related resources
    slots:
      - reference
    slot_usage:
      reference:
        description: URL or citation string for related resource
        range: string

  Citation:
    description: Citation information for the model
    slots:
      - style
      - citation
    slot_usage:
      style:
        description: Citation format style
        range: CitationStyleEnum
      citation:
        description: Formatted citation text
        range: string

  # ========== Model Details ==========

  ModelDetails:
    description: Comprehensive metadata about the model
    slots:
      - name
      - overview
      - documentation
      # CHANGED: 'owners' replaced with 'creators' using datasheets classes
      - creators
      - maintainer
      - version
      - licenses
      - references
      - citations
      - path
      # NEW: Provenance tracking
      - created_by
      - modified_by
      - created_on
      - modified_on
      - was_derived_from
      # NEW: Funding information
      - funded_by
    slot_usage:
      name:
        description: Model name or identifier
        range: string
        required: true
      overview:
        description: High-level description of what the model does
        range: string
      documentation:
        description: Detailed documentation and usage guide
        range: string
      creators:
        description: Model creators and contributors (datasheets Person/Organization)
        range: datasheets:Creator
        multivalued: true
        comments:
          - "Use datasheets:Person for individuals with ORCID, roles, affiliations"
          - "Use datasheets:Organization for institutions"
          - "Supports CRediT taxonomy for contributor roles"
      maintainer:
        description: Current model maintainer(s)
        range: datasheets:Creator
        multivalued: true
      version:
        description: Version information
        range: Version
      licenses:
        description: Licensing information
        range: License
        multivalued: true
        comments:
          - "For comprehensive IP/regulatory licensing, also reference datasheets:LicensingAndIntellectualProperty"
      references:
        description: References to related resources
        range: Reference
        multivalued: true
      citations:
        description: How to cite this model
        range: Citation
        multivalued: true
      path:
        description: Storage location or path to model artifacts
        range: string
      created_by:
        description: Who created this model card
        range: datasheets:Creator
        multivalued: true
      modified_by:
        description: Who last modified this model card
        range: datasheets:Person
        multivalued: true
      created_on:
        description: When this model card was created
        range: datetime
      modified_on:
        description: When this model card was last modified
        range: datetime
      was_derived_from:
        description: Previous version or source model card
        range: string
      funded_by:
        description: Funding sources for model development
        range: datasheets:Grant
        multivalued: true

  # ========== Dataset Classes ==========
  # NOTE: Most dataset documentation now delegated to datasheets Dataset class

  # DEPRECATED CLASS - Use datasheets PrivacyAndSecurity instead
  # SensitiveData:
  #   description: |-
  #     DEPRECATED - Use datasheets PrivacyAndSecurity class instead
  #
  #     The datasheets schema provides comprehensive privacy and security documentation:
  #     - PII categories and anonymization
  #     - Consent mechanisms
  #     - Regulatory compliance (GDPR, CCPA, HIPAA)
  #     - Access controls and security measures
  #   slots:
  #     - sensitive_data

  GraphicsCollection:
    description: Collection of graphics and visualizations
    slots:
      - description
      - collection
    slot_usage:
      description:
        description: Description of this graphics collection
        range: string
      collection:
        description: Graphics in this collection
        range: graphic
        multivalued: true

  graphic:
    description: A single graphic or visualization
    slots:
      - name
      - image
    slot_usage:
      name:
        description: Name or title of the graphic
        range: string
      image:
        description: Base64-encoded PNG image
        range: string

  # DEPRECATED CLASS - Use datasheets Dataset instead
  # dataSet:
  #   description: |-
  #     DEPRECATED - Use datasheets Dataset class instead
  #
  #     Migration: Replace dataSet references with datasheets:Dataset
  #
  #     The datasheets Dataset class provides comprehensive documentation:
  #     - Motivation section: Purpose, tasks, funding
  #     - Composition: Instance counts, missing data, confidentiality
  #     - Collection: Acquisition mechanisms, sampling, timeframes
  #     - Preprocessing: Cleaning, transformations, raw data availability
  #     - Uses: Tasks, impact considerations, inappropriate uses
  #     - Distribution: Licensing, IP restrictions, export controls
  #     - Maintenance: Support, updates, contribution mechanisms
  #
  #     Old usage:
  #       data:
  #         - name: "IMDb"
  #           link: "https://example.com"
  #           description: "Movie reviews"
  #
  #     New usage:
  #       training_data:
  #         - name: "IMDb Sentiment Dataset"
  #           homepage: "https://example.com"
  #           motivation:
  #             purpose: "Sentiment analysis training"
  #             creators: [{...}]
  #           composition:
  #             instance_count: 50000
  #             ...
  #           # ... full datasheets documentation
  #   slots:
  #     - name
  #     - description
  #     - link
  #     - sensitive
  #     - graphics
  #     - bias_input
  #     - unit

  # ========== Model Parameters ==========

  KeyVal:
    description: Key-value pair for format mappings
    slots:
      - key
      - value
    slot_usage:
      key:
        description: Key identifier
        range: string
      value:
        description: Value associated with the key
        range: string

  ModelParameters:
    description: Parameters and specifications for model construction
    slots:
      - model_architecture
      # CHANGED: 'data' split into 'training_data' and 'evaluation_data' using datasheets Dataset
      - training_data
      - evaluation_data
      - input_format
      - input_format_map
      - output_format
      - output_format_map
    slot_usage:
      model_architecture:
        description: Model architecture specification and description
        range: string
      training_data:
        description: Training datasets (references datasheets Dataset)
        range: datasheets:Dataset
        multivalued: true
        comments:
          - "Each dataset should be a complete datasheets Dataset instance"
          - "Provides comprehensive dataset documentation (motivation, composition, collection, etc.)"
          - "Replaces the simple 'dataSet' class"
      evaluation_data:
        description: Evaluation/test datasets (references datasheets Dataset)
        range: datasheets:Dataset
        multivalued: true
        comments:
          - "Separate from training data for clarity"
      input_format:
        description: Plain text description of input format
        range: string
      input_format_map:
        description: Structured mapping of input format fields
        range: KeyVal
        multivalued: true
      output_format:
        description: Plain text description of output format
        range: string
      output_format_map:
        description: Structured mapping of output format fields
        range: KeyVal
        multivalued: true

  # ========== Performance & Quantitative Analysis ==========

  ConfidenceInterval:
    description: Confidence interval for a metric value
    slots:
      - lower_bound
      - upper_bound
    slot_usage:
      lower_bound:
        description: Lower bound of the confidence interval
        range: float
      upper_bound:
        description: Upper bound of the confidence interval
        range: float

  performanceMetric:
    description: A performance metric with optional confidence interval
    slots:
      - type
      - value
      - value_error
      - confidence_interval
      - threshold
      - slice
      - unit
    slot_usage:
      type:
        description: Type of performance metric (e.g., 'accuracy', 'F1', 'AUC', 'precision')
        range: string
        required: true
      value:
        description: Metric value
        range: float
      value_error:
        description: Estimated error for the metric value
        range: float
      confidence_interval:
        description: Confidence interval for the metric
        range: ConfidenceInterval
      threshold:
        description: Decision threshold used when computing this metric
        range: float
      slice:
        description: Data slice or subset this metric was computed on
        range: string
      unit:
        description: Unit for the metric value, if applicable
        range: string

  QuantitativeAnalysis:
    description: Quantitative analysis and performance evaluation of the model
    slots:
      - performance_metrics
      - graphics
    slot_usage:
      performance_metrics:
        description: Performance metrics and evaluation results
        range: performanceMetric
        multivalued: true
      graphics:
        description: Performance visualizations and plots
        range: GraphicsCollection

  # ========== Considerations ==========

  User:
    description: Description of an intended user type
    slots:
      - description
    slot_usage:
      description:
        description: Description of the intended user type or role
        range: string

  UseCase:
    description: Description of a use case or application scenario
    slots:
      - description
    slot_usage:
      description:
        description: Description of the application scenario
        range: string

  Limitation:
    description: A known limitation or constraint of the model
    slots:
      - description
    slot_usage:
      description:
        description: Description of the limitation or constraint
        range: string

  Tradeoff:
    description: A performance tradeoff consideration
    slots:
      - description
    slot_usage:
      description:
        description: Description of the performance tradeoff
        range: string

  risk:
    description: An ethical, environmental, or operational risk
    slots:
      - name
      - mitigation_strategy
    slot_usage:
      name:
        description: Name or type of the risk
        range: string
      mitigation_strategy:
        description: Strategy used to address or mitigate this risk
        range: string

  Considerations:
    description: Considerations for model usage including limitations and ethical concerns
    slots:
      - users
      - use_cases
      - limitations
      - tradeoffs
      - ethical_considerations
      # NEW: Privacy and security considerations from datasheets
      - privacy_security
    slot_usage:
      users:
        description: Intended user types
        range: User
        multivalued: true
      use_cases:
        description: Intended use cases and application scenarios
        range: UseCase
        multivalued: true
      limitations:
        description: Known limitations and constraints
        range: Limitation
        multivalued: true
      tradeoffs:
        description: Performance tradeoffs to consider
        range: Tradeoff
        multivalued: true
      ethical_considerations:
        description: Ethical considerations and identified risks
        range: risk
        multivalued: true
      privacy_security:
        description: Privacy and security considerations (from datasheets)
        range: datasheets:PrivacyAndSecurity
        comments:
          - "Comprehensive privacy/security documentation"
          - "Includes PII analysis, anonymization, consent, GDPR/CCPA compliance"
          - "Replaces the simple 'SensitiveData' class"

  # ========== Benchmark Integration (HuggingFace/Papers with Code) ==========

  Task:
    description: ML task specification for benchmarking
    slots:
      - type
      - name
    slot_usage:
      type:
        description: Task type identifier (e.g., 'text-generation', 'image-classification')
        range: string
      name:
        description: Human-readable task name
        range: string

  BenchmarkDataset:
    description: Dataset used for benchmarking
    slots:
      - type
      - name
      - config
      - split
      - revision
      - args
    slot_usage:
      type:
        description: Dataset type identifier
        range: string
      name:
        description: Dataset name
        range: string
      config:
        description: Dataset configuration
        range: string
      split:
        description: Dataset split (train, test, validation)
        range: string
      revision:
        description: Dataset version or revision
        range: string
      args:
        description: Additional arguments for dataset loading

  BenchmarkMetric:
    description: Benchmark metric result
    slots:
      - type
      - value
      - name
      - config
      - args
    slot_usage:
      type:
        description: Metric type identifier
        range: string
      value:
        description: Metric value
        range: float
      name:
        description: Metric name
        range: string
      config:
        description: Metric configuration
        range: string
      args:
        description: Additional metric arguments

  BenchmarkSource:
    description: Source of benchmark results
    slots:
      - name
      - url
    slot_usage:
      name:
        description: Source name (e.g., 'Open LLM Leaderboard', 'GLUE Benchmark')
        range: string
      url:
        description: URL to the source
        range: uri

  BenchmarkResult:
    description: Benchmark result entry with task, dataset, and metrics
    slots:
      - task
      - dataset
      - metrics
      - source
    slot_usage:
      task:
        description: Task that was evaluated
        range: Task
      dataset:
        description: Dataset used for evaluation
        range: BenchmarkDataset
      metrics:
        description: Metrics reported for this benchmark
        range: BenchmarkMetric
        multivalued: true
      source:
        description: Source of the benchmark results
        range: BenchmarkSource

  ModelIndex:
    description: Papers with Code model-index structure for benchmark tracking
    slots:
      - name
      - results
    slot_usage:
      name:
        description: Model name for this benchmark entry
        range: string
      results:
        description: Benchmark results
        range: BenchmarkResult
        multivalued: true

  # ========== Root Model Card ==========

  modelCard:
    tree_root: true
    description: |-
      Complete model card with metadata, performance, and considerations

      HARMONIZATION SUMMARY:
      This harmonized version integrates with datasheets for datasets schema to:
      1. Use datasheets Creator classes for comprehensive author/contributor documentation
      2. Reference datasheets Dataset for comprehensive dataset documentation (60+ fields)
      3. Leverage datasheets PrivacyAndSecurity for ethics/privacy considerations
      4. Include provenance tracking (created_by, modified_by, timestamps)
      5. Add funding and maintainer references

      BACKWARD COMPATIBILITY:
      - The 'owner' class is deprecated (use datasheets Person/Organization)
      - The 'dataSet' class is deprecated (use datasheets Dataset)
      - The 'SensitiveData' class is deprecated (use datasheets PrivacyAndSecurity)
      - All other model card fields remain compatible
    slots:
      # Core sections (Google Model Card Toolkit)
      - schema_version
      - model_details
      - model_parameters
      - quantitative_analysis
      - considerations
      - model_category
      - bias_model
      - bias_output

      # HuggingFace/Community metadata
      - framework
      - framework_version
      - library_name
      - pipeline_tag
      - language
      - base_model
      - tags
      - datasets
      - metrics

      # Benchmark integration (Papers with Code)
      - model_index

      # NEW: Provenance tracking
      - created_by
      - modified_by
      - created_on
      - modified_on
      - was_derived_from

      # NEW: Funding
      - funded_by

    slot_usage:
      # Core sections
      schema_version:
        description: Version of the model card schema being used (recommend '0.0.2-harmonized')
        range: string
      model_details:
        description: Comprehensive model metadata and details
        range: ModelDetails
        required: true
      model_parameters:
        description: Model construction and architecture parameters
        range: ModelParameters
      quantitative_analysis:
        description: Quantitative analysis and performance evaluation
        range: QuantitativeAnalysis
      considerations:
        description: Usage considerations, limitations, and ethical concerns
        range: Considerations
      model_category:
        description: Category or parent class of the model
        range: string
      bias_model:
        description: Known biases in the model itself
        range: string
      bias_output:
        description: Known biases in the model's outputs
        range: string

      # HuggingFace/Community metadata
      framework:
        description: ML framework used (TensorFlow, PyTorch, JAX, Scikit-Learn, etc.)
        range: string
      framework_version:
        description: Version of the ML framework
        range: string
      library_name:
        description: Library name for loading the model (e.g., transformers, diffusers, timm)
        range: string
      pipeline_tag:
        description: Task type for pipeline usage
        range: string
      language:
        description: Natural language(s) processed by the model
        multivalued: true
        range: string
      base_model:
        description: Parent model identifier (for fine-tuned or derived models)
        range: string
      tags:
        description: Searchable keywords and tags for discovery
        multivalued: true
        range: string
      datasets:
        description: Training dataset identifiers or names
        multivalued: true
        range: string
      metrics:
        description: Evaluation metrics used for this model
        multivalued: true
        range: string

      # Benchmark integration
      model_index:
        description: Benchmark results following Papers with Code model-index format
        range: ModelIndex
        multivalued: true

      # Provenance tracking
      created_by:
        description: Creator(s) of this model card document
        range: datasheets:Creator
        multivalued: true
      modified_by:
        description: Person(s) who last modified this model card
        range: datasheets:Person
        multivalued: true
      created_on:
        description: Creation timestamp
        range: datetime
      modified_on:
        description: Last modification timestamp
        range: datetime
      was_derived_from:
        description: Previous version or source model card
        range: string

      # Funding
      funded_by:
        description: Funding sources for model development
        range: datasheets:Grant
        multivalued: true

