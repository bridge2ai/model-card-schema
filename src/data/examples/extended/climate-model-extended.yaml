# ========== Extended Template: USAGE DOCUMENTATION ==========

usage_documentation:
  installation_instructions: |
    ## Installation

    ### Option 1: Conda (Recommended)
    ```bash
    # Clone repository
    git clone https://github.com/lbnl-climate/climatenet-v2.git
    cd climatenet-v2

    # Create conda environment
    conda env create -f environment.yml
    conda activate climatenet-v2

    # Install package
    pip install -e .
    ```

    ### Option 2: Docker
    ```bash
    docker pull ghcr.io/lbnl-climate/climatenet-v2:latest
    docker run -it --gpus all ghcr.io/lbnl-climate/climatenet-v2:latest
    ```

    ### Option 3: NERSC Module
    ```bash
    module load climatenet/2.0.0
    ```

    ## Model Checkpoint
    ```bash
    # Download pretrained weights (650 MB)
    wget https://climatenet.lbl.gov/models/climatenet-v2.0.0.pth
    ```

  training_configuration: |
    ## Training Configuration

    Reproduce training on NERSC Perlmutter:

    ```bash
    # Request GPU nodes
    salloc -N 64 -C gpu -q regular -t 4:00:00 -A m1234

    # Launch training
    srun -N 64 --ntasks-per-node=4 --gpus-per-task=1 \
      python training/train.py \
        --config configs/resnet50_fpn.yaml \
        --data-path /pscratch/sd/u/user/climatenet_data \
        --output-dir /pscratch/sd/u/user/climatenet_output \
        --seed 42
    ```

    See `configs/resnet50_fpn.yaml` for all hyperparameters.

  inference_configuration: |
    ## Inference Configuration

    Run inference on climate model output:

    ```bash
    python inference/predict.py \
      --model-checkpoint climatenet-v2.0.0.pth \
      --input-file /path/to/climate_model_output.nc \
      --output-file /path/to/predictions.h5 \
      --batch-size 32 \
      --device cuda:0
    ```

    ### Batch Processing
    ```bash
    # Process all files in directory
    python inference/batch_predict.py \
      --model-checkpoint climatenet-v2.0.0.pth \
      --input-dir /path/to/climate_data/ \
      --output-dir /path/to/predictions/ \
      --num-workers 8
    ```

  code_examples:
    - code: |
        import torch
        from climatenet.models import ClimateNetV2
        from climatenet.data import load_climate_patch

        # Load model
        model = ClimateNetV2.from_pretrained('climatenet-v2.0.0.pth')
        model.eval()
        model.cuda()

        # Load data patch
        patch = load_climate_patch('sample_data.nc')  # shape: (16, 768, 768)
        patch = torch.from_numpy(patch).unsqueeze(0).cuda()

        # Run inference
        with torch.no_grad():
            outputs = model(patch)

        # Extract results
        segmentation_mask = outputs['segmentation'].argmax(dim=1)  # (1, 768, 768)
        bounding_boxes = outputs['detections']  # List of (x1, y1, x2, y2, class, conf)

        print(f"Detected {len(bounding_boxes)} events")
        print(f"Segmentation shape: {segmentation_mask.shape}")
      code_language: "python"
      description: "Basic inference example: Load model and run prediction on a single patch"

    - code: |
        from climatenet.evaluation import compute_metrics
        from climatenet.data import ClimateDataset

        # Load test dataset
        test_dataset = ClimateDataset(
            data_path='/path/to/test_data',
            split='test'
        )

        # Compute metrics
        metrics = compute_metrics(
            model=model,
            dataset=test_dataset,
            device='cuda',
            num_workers=4
        )

        print(f"Tropical Cyclone IoU: {metrics['tc_iou']:.3f}")
        print(f"Atmospheric River IoU: {metrics['ar_iou']:.3f}")
        print(f"Weather Front IoU: {metrics['front_iou']:.3f}")
        print(f"Detection mAP@0.5: {metrics['map_050']:.3f}")
      code_language: "python"
      description: "Evaluation example: Compute metrics on test dataset"

    - code: |
        #!/bin/bash
        # Batch processing script for NERSC

        #SBATCH -N 1
        #SBATCH -C gpu
        #SBATCH -q regular
        #SBATCH -t 02:00:00
        #SBATCH -A m1234

        module load climatenet/2.0.0

        # Process all files in directory
        for file in /pscratch/sd/u/user/climate_data/*.nc; do
            srun -n 1 python inference/predict.py \
                --model-checkpoint $SCRATCH/climatenet-v2.0.0.pth \
                --input-file "$file" \
                --output-file "${file%.nc}_predictions.h5" \
                --device cuda:0
        done
      code_language: "bash"
      description: "Batch processing script for SLURM (NERSC Perlmutter)"
