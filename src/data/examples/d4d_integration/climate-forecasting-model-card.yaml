usage_documentation:
  installation_instructions: |-
    ```bash
    # Clone repository
    git clone https://github.com/climate-ai-lab/climate-transformer
    cd climate-transformer

    # Create environment
    conda create -n climate-forecast python=3.10
    conda activate climate-forecast

    # Install dependencies
    pip install -r requirements.txt

    # Download model weights
    aws s3 cp s3://climate-models/forecasting-transformer-v2.1/ ./weights/ --recursive
    ```

  training_configuration: |-
    ```python
    # Training configuration
    from climate_transformer import ClimateTransformer, Trainer

    model = ClimateTransformer(
        spatial_dim=16,
        temporal_dim=168,
        hidden_dim=512,
        num_layers=12,
        num_heads=8,
        num_variables=5
    )

    trainer = Trainer(
        model=model,
        batch_size=32,
        learning_rate=1e-4,
        num_epochs=50,
        devices=[0,1,2,3,4,5,6,7],  # 8 GPUs
        precision='fp16',
        gradient_checkpointing=True
    )

    trainer.fit(train_dataloader, val_dataloader)
    ```

  inference_configuration: |-
    ```python
    # Inference configuration
    from climate_transformer import ClimateTransformer
    import torch

    # Load model
    model = ClimateTransformer.from_pretrained('./weights/')
    model.eval()
    model = model.to('cuda')

    # Run inference
    with torch.no_grad():
        forecast = model(
            input_tensor,  # [batch, time, lat, lon, vars]
            return_quantiles=True  # Get probabilistic forecast
        )

    # forecast shape: [batch, 168, 16, 16, 5, 5]
    # Last dimension: quantiles [0.1, 0.25, 0.5, 0.75, 0.9]
    ```

  code_examples:
    - code: |-
        # Example: Load data and make 7-day forecast
        from climate_transformer import ClimateTransformer, load_noaa_data

        # Load historical data
        historical_data = load_noaa_data(
            start='2024-01-01',
            end='2024-01-07',
            region='north_america'
        )

        # Load model
        model = ClimateTransformer.from_pretrained('./weights/')

        # Generate forecast
        forecast = model.forecast(
            historical_data,
            forecast_days=7,
            uncertainty=True
        )

        # Access results
        median_temp = forecast['temperature']['quantile_0.5']
        upper_bound = forecast['temperature']['quantile_0.9']
        lower_bound = forecast['temperature']['quantile_0.1']
      code_language: python
      description: Basic usage example for 7-day climate forecasting

    - code: |-
        # Example: Detect extreme weather events
        from climate_transformer import ClimateTransformer, ExtremeDetector

        model = ClimateTransformer.from_pretrained('./weights/')
        detector = ExtremeDetector(model, threshold=0.5)

        # Detect extreme events in forecast
        forecast = model.forecast(historical_data, forecast_days=7)
        events = detector.detect_extremes(forecast)

        # Print detected events
        for event in events:
            print(f"{event['type']}: {event['location']} on {event['day']}")
            print(f"  Confidence: {event['confidence']:.2f}")
      code_language: python
      description: Extreme weather event detection example
