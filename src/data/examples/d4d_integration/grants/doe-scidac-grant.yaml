project_details:
  abstract: |-
    This project develops next-generation AI models for climate prediction using
    exascale computing resources at DOE Leadership Computing Facilities. Focus areas
    include transformer architectures for spatiotemporal climate modeling, extreme
    weather event detection, and uncertainty quantification. The project leverages
    Frontier (OLCF) and Polaris (ALCF) supercomputers to train models on 50+ years
    of climate observations, enabling 7-day regional forecasts with unprecedented
    accuracy and uncertainty estimates.

  objectives:
    - Develop transformer-based climate models optimized for exascale systems
    - Achieve 20% improvement over current SOTA in regional climate forecasting
    - Implement uncertainty quantification for extreme weather prediction
    - Deploy models for operational use by NOAA and emergency management agencies

  deliverables:
    - Open-source climate forecasting model (GitHub)
    - Peer-reviewed publications (3-5 papers)
    - Training datasets and benchmarks
    - Model cards and documentation
    - Workshops and tutorials for climate science community

